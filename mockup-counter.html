<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>מוקאפ — אנימציית מונה ספירה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#070c15;--s1:#0d1525;--s2:#131e30;
  --border:rgba(255,255,255,0.06);
  --text:#e2eaf8;--muted:#5d7494;--dim:#2a3d58;
  --green:#22c55e;--red:#f43f5e;--amber:#f59e0b;--blue:#3b82f6;
}
html,body{width:100%;height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(59,130,246,0.05),transparent 70%);pointer-events:none;}

.mockup-label{
  position:fixed;top:12px;right:12px;z-index:99;
  font-size:10px;font-weight:800;color:var(--amber);
  background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);
  border-radius:6px;padding:3px 10px;letter-spacing:.5px;
}

.page{
  max-width:480px;margin:0 auto;padding:20px 16px 100px;
}

.section-title{
  font-size:12px;font-weight:800;color:var(--muted);
  letter-spacing:.5px;text-transform:uppercase;
  margin:28px 0 12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* ═══ HERO TOTAL ═══ */
.hero{
  background:rgba(59,130,246,0.06);
  border:1px solid rgba(59,130,246,0.15);
  border-radius:20px;padding:28px 20px;
  text-align:center;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(59,130,246,0.1),transparent 60%);
  pointer-events:none;
}
.hero-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.hero-num{
  font-size:80px;font-weight:900;line-height:1;letter-spacing:-3px;
  color:var(--blue);position:relative;
}
.hero-sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:6px;}

/* Flip digit animation */
.flip-digit{
  display:inline-block;position:relative;
  overflow:hidden;height:1em;line-height:1;
  vertical-align:top;
}
.flip-digit .digit-inner{
  display:inline-block;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.flip-digit.animating .digit-inner{
  animation:flipUp .5s cubic-bezier(.4,0,.2,1);
}
@keyframes flipUp{
  0%{transform:translateY(100%);opacity:0;}
  100%{transform:translateY(0);opacity:1;}
}
@keyframes flipDown{
  0%{transform:translateY(-100%);opacity:0;}
  100%{transform:translateY(0);opacity:1;}
}
.flip-digit.animating-down .digit-inner{
  animation:flipDown .5s cubic-bezier(.4,0,.2,1);
}

/* Delta badge */
.delta{
  display:inline-flex;align-items:center;gap:3px;
  font-size:14px;font-weight:800;
  border-radius:8px;padding:3px 10px;
  margin-right:8px;
  animation:deltaPop .4s cubic-bezier(.2,0,.2,1);
  vertical-align:middle;
}
.delta.up{color:var(--green);background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);}
.delta.down{color:var(--red);background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);}
@keyframes deltaPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

/* ═══ WING CARDS ═══ */
.wing-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:16px;padding:16px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
  transition:all .3s;position:relative;overflow:hidden;
}
.wing-card.done{background:rgba(34,197,94,0.05);border-color:rgba(34,197,94,0.2);}
.wing-card.busy{background:rgba(245,158,11,0.05);border-color:rgba(245,158,11,0.2);}

.wing-right{display:flex;flex-direction:column;gap:2px;}
.wing-name{font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px;}
.wing-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);}
.wing-card.done .wing-dot{background:var(--green);}
.wing-card.busy .wing-dot{background:var(--amber);animation:pulse 2s infinite;}
.wing-status{font-size:11px;font-weight:600;color:var(--dim);}
.wing-card.done .wing-status{color:rgba(34,197,94,0.6);}
.wing-card.busy .wing-status{color:rgba(245,158,11,0.6);}

.wing-left{display:flex;align-items:center;gap:8px;}
.wing-num{
  font-size:34px;font-weight:900;line-height:1;letter-spacing:-1px;
  min-width:60px;text-align:left;
}
.wing-card.done .wing-num{color:var(--green);}
.wing-card.busy .wing-num{color:var(--amber);}
.wing-delta{
  font-size:11px;font-weight:800;
  border-radius:6px;padding:2px 7px;
  opacity:0;transition:opacity .3s;
}
.wing-delta.show{opacity:1;animation:deltaPop .4s cubic-bezier(.2,0,.2,1);}
.wing-delta.up{color:var(--green);background:rgba(34,197,94,0.12);}
.wing-delta.down{color:var(--red);background:rgba(244,63,94,0.12);}

/* Ripple effect on change */
.wing-card .ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(59,130,246,0.15);
  transform:scale(0);
  animation:ripple .8s ease-out;
  pointer-events:none;
}
.wing-card.done .ripple{background:rgba(34,197,94,0.12);}
.wing-card.busy .ripple{background:rgba(245,158,11,0.12);}
@keyframes ripple{to{transform:scale(4);opacity:0;}}

/* ═══ CONTROLS (demo) ═══ */
.controls{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,15,26,0.9);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  z-index:10;
}
.ctrl-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;color:var(--text);font-family:'Heebo',sans-serif;
  font-size:13px;font-weight:700;padding:10px 18px;cursor:pointer;
  transition:background .15s;display:flex;align-items:center;gap:6px;
}
.ctrl-btn:hover{background:rgba(255,255,255,0.1);}
.ctrl-btn.green{color:var(--green);border-color:rgba(34,197,94,0.3);}
.ctrl-btn.red{color:var(--red);border-color:rgba(244,63,94,0.3);}
.ctrl-btn.blue{color:var(--blue);border-color:rgba(59,130,246,0.3);}
.ctrl-info{font-size:11px;color:var(--dim);font-weight:600;text-align:center;margin-top:4px;}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
</style>
</head>
<body>

<div class="mockup-label">MOCKUP</div>

<div class="page">

  <!-- HERO TOTAL -->
  <div class="hero">
    <div class="hero-label">סה״כ במקום</div>
    <div class="hero-num" id="heroNum">
      <span class="flip-digit"><span class="digit-inner">8</span></span><span class="flip-digit"><span class="digit-inner">8</span></span>
    </div>
    <div id="heroDelta" style="min-height:24px;margin-top:6px;"></div>
    <div class="hero-sub">ספירת צהריים — 3/5 אגפים</div>
  </div>

  <div class="section-title">אגפים</div>

  <!-- WINGS -->
  <div id="wingList">
    <div class="wing-card done" id="wc-0">
      <div class="wing-right"><div class="wing-name"><div class="wing-dot"></div>ורד</div><div class="wing-status">דווח</div></div>
      <div class="wing-left"><div class="wing-delta" id="wd-0"></div><div class="wing-num" id="wn-0">24</div></div>
    </div>
    <div class="wing-card busy" id="wc-1">
      <div class="wing-right"><div class="wing-name"><div class="wing-dot"></div>חמנייה</div><div class="wing-status">בתהליך</div></div>
      <div class="wing-left"><div class="wing-delta" id="wd-1"></div><div class="wing-num" id="wn-1">18</div></div>
    </div>
    <div class="wing-card done" id="wc-2">
      <div class="wing-right"><div class="wing-name"><div class="wing-dot"></div>כלנית</div><div class="wing-status">דווח</div></div>
      <div class="wing-left"><div class="wing-delta" id="wd-2"></div><div class="wing-num" id="wn-2">31</div></div>
    </div>
    <div class="wing-card" id="wc-3">
      <div class="wing-right"><div class="wing-name"><div class="wing-dot"></div>רקפת</div><div class="wing-status">ממתין</div></div>
      <div class="wing-left"><div class="wing-delta" id="wd-3"></div><div class="wing-num" id="wn-3" style="color:var(--dim)">0</div></div>
    </div>
    <div class="wing-card done" id="wc-4">
      <div class="wing-right"><div class="wing-name"><div class="wing-dot"></div>נרקיס</div><div class="wing-status">דווח</div></div>
      <div class="wing-left"><div class="wing-delta" id="wd-4"></div><div class="wing-num" id="wn-4">15</div></div>
    </div>
  </div>
</div>

<!-- Controls for demo -->
<div class="controls">
  <div class="ctrl-btn green" onclick="simAdd()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    הוסף אסיר אקראי
  </div>
  <div class="ctrl-btn red" onclick="simRemove()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    הורד אסיר אקראי
  </div>
  <div class="ctrl-btn blue" onclick="simBurst()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
    סימולציה מהירה
  </div>
</div>

<script>
const wingVals = [24, 18, 31, 0, 15];
let total = wingVals.reduce((s,v) => s+v, 0);

function animateDigits(container, newVal) {
  const str = String(newVal);
  const existing = container.querySelectorAll('.flip-digit');
  const oldStr = Array.from(existing).map(d => d.querySelector('.digit-inner').textContent).join('');

  // Rebuild digits
  container.innerHTML = '';
  for (let i = 0; i < str.length; i++) {
    const span = document.createElement('span');
    span.className = 'flip-digit';
    const inner = document.createElement('span');
    inner.className = 'digit-inner';
    inner.textContent = str[i];
    span.appendChild(inner);

    // Animate if digit changed
    if (!oldStr[i] || oldStr[i] !== str[i]) {
      const dir = parseInt(str) >= parseInt(oldStr) ? '' : '-down';
      span.classList.add('animating' + dir);
      setTimeout(() => span.classList.remove('animating' + dir), 500);
    }
    container.appendChild(span);
  }
}

function showDelta(el, diff) {
  if (diff === 0) return;
  const cls = diff > 0 ? 'up' : 'down';
  const sign = diff > 0 ? '+' : '';
  el.className = `wing-delta ${cls} show`;
  el.textContent = sign + diff;
  setTimeout(() => { el.classList.remove('show'); }, 2000);
}

function showHeroDelta(diff) {
  if (diff === 0) return;
  const el = document.getElementById('heroDelta');
  const cls = diff > 0 ? 'up' : 'down';
  const sign = diff > 0 ? '+' : '';
  const arrow = diff > 0 ? '↑' : '↓';
  el.innerHTML = `<span class="delta ${cls}">${arrow} ${sign}${diff}</span>`;
  setTimeout(() => { el.innerHTML = ''; }, 2500);
}

function addRipple(card) {
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = '100px';
  ripple.style.left = '50%';
  ripple.style.top = '50%';
  ripple.style.marginLeft = '-50px';
  ripple.style.marginTop = '-50px';
  card.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);
}

function updateWing(idx, diff) {
  wingVals[idx] = Math.max(0, wingVals[idx] + diff);
  total = wingVals.reduce((s,v) => s+v, 0);

  // Animate wing number
  const numEl = document.getElementById('wn-' + idx);
  animateDigits(numEl, wingVals[idx]);

  // Delta badge on wing
  showDelta(document.getElementById('wd-' + idx), diff);

  // Ripple
  addRipple(document.getElementById('wc-' + idx));

  // Hero total
  animateDigits(document.getElementById('heroNum'), total);
  showHeroDelta(diff);
}

function simAdd() {
  const idx = Math.floor(Math.random() * 5);
  const amount = Math.floor(Math.random() * 3) + 1;
  updateWing(idx, amount);
}

function simRemove() {
  const nonZero = wingVals.map((v,i) => v > 0 ? i : -1).filter(i => i >= 0);
  if (!nonZero.length) return;
  const idx = nonZero[Math.floor(Math.random() * nonZero.length)];
  const amount = Math.min(wingVals[idx], Math.floor(Math.random() * 3) + 1);
  updateWing(idx, -amount);
}

function simBurst() {
  let delay = 0;
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      if (Math.random() > 0.3) simAdd(); else simRemove();
    }, delay);
    delay += 400 + Math.random() * 300;
  }
}

// Init digit display
animateDigits(document.getElementById('heroNum'), total);
wingVals.forEach((v, i) => {
  animateDigits(document.getElementById('wn-' + i), v);
});
</script>
</body>
</html>
