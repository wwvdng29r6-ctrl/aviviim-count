<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#edf2f7">
<title>מרכז פיקוד — תצוגת קיוסק</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  color-scheme: light only;
  --bg:#edf2f7;
  --surface:rgba(255,255,255,0.72);
  --surface-solid:#ffffff;
  --surface-hover:rgba(255,255,255,0.88);
  --border:rgba(0,0,0,0.06);
  --border2:rgba(0,0,0,0.10);
  --green:#10b981;
  --green-soft:rgba(16,185,129,0.08);
  --green-border:rgba(16,185,129,0.22);
  --blue:#2563eb;
  --blue-soft:rgba(37,99,235,0.07);
  --blue-border:rgba(37,99,235,0.18);
  --amber:#d97706;
  --amber-soft:rgba(217,119,6,0.07);
  --amber-border:rgba(217,119,6,0.2);
  --red:#ef4444;
  --red-soft:rgba(239,68,68,0.07);
  --text:#0c1829;
  --muted:#4a6480;
  --dim:rgba(10,24,40,0.28);
  --r-sm:10px;
  --r-md:14px;
  --r-lg:18px;
  --r-xl:24px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md:0 4px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
}

html,body{
  width:100%;height:100vh;overflow:hidden;
  width:100%;height:100dvh;overflow:hidden;
  font-family:'Heebo',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

/* ═══ AMBIENT BACKGROUND ═══ */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 0%, rgba(37,99,235,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 85% 95%, rgba(16,185,129,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 40% 35% at 60% 40%, rgba(217,119,6,0.03) 0%, transparent 40%);
  pointer-events:none;z-index:0;
}

/* ═══ UTILITY ═══ */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeScale { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
@keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.65)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes countUp { from{opacity:0;transform:translateY(12px) scale(0.9)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }

/* ═══ PIN LOCK SCREEN ═══ */
#pinScreen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg, #edf2f7 0%, #e2e8f0 50%, #edf2f7 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(1.2rem,3vh,2rem);
}
#pinScreen.hidden{display:none;}

.pin-lock-icon{
  width:clamp(56px,8vw,80px);height:clamp(56px,8vw,80px);
  border-radius:50%;
  background:linear-gradient(135deg, var(--blue-soft) 0%, rgba(37,99,235,0.12) 100%);
  border:1.5px solid var(--blue-border);
  display:flex;align-items:center;justify-content:center;
  color:var(--blue);
  animation:fadeScale 0.5s ease-out;
  box-shadow:0 4px 24px rgba(37,99,235,0.1);
}
.pin-title{
  font-size:clamp(22px,3vw,32px);font-weight:900;color:var(--text);
  letter-spacing:-.5px;
  animation:fadeIn 0.4s ease-out 0.1s both;
}
.pin-sub{
  font-size:clamp(13px,1.5vw,16px);color:var(--muted);font-weight:400;
  margin-top:-4px;
  animation:fadeIn 0.4s ease-out 0.15s both;
}
.pin-dots{display:flex;gap:clamp(10px,1.5vw,16px);margin:4px 0;}
.pin-dot{
  width:clamp(13px,1.8vw,18px);height:clamp(13px,1.8vw,18px);
  border-radius:50%;
  background:rgba(0,0,0,0.06);
  border:2px solid rgba(0,0,0,0.1);
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.pin-dot.filled{
  background:var(--blue);border-color:var(--blue);
  transform:scale(1.15);
  box-shadow:0 0 12px rgba(37,99,235,0.3);
}
.pin-pad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,1.2vw,12px);
  width:clamp(200px,26vw,290px);
  animation:fadeIn 0.4s ease-out 0.2s both;
}
.pin-btn{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  color:var(--text);
  font-family:'Heebo',sans-serif;
  font-size:clamp(20px,2.5vw,28px);
  font-weight:700;
  height:clamp(54px,7vw,74px);
  cursor:pointer;
  transition:all .15s ease;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:var(--shadow-sm);
}
.pin-btn:hover{background:var(--surface-hover);box-shadow:var(--shadow-md);}
.pin-btn:active{
  background:var(--blue-soft);
  border-color:var(--blue-border);
  transform:scale(.93);
  box-shadow:none;
}
.pin-btn.del{font-size:clamp(16px,2vw,22px);color:var(--muted);}
.pin-err{
  color:var(--red);font-size:14px;font-weight:700;
  opacity:0;transition:opacity .25s;min-height:22px;
  display:flex;align-items:center;gap:6px;
}
.pin-err.show{opacity:1;}

/* ═══ EXIT PIN OVERLAY ═══ */
#exitPinOverlay{
  position:fixed;inset:0;z-index:8888;
  background:linear-gradient(160deg, #edf2f7 0%, #e2e8f0 50%, #edf2f7 100%);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;
}
#exitPinOverlay.open{display:flex;}
.exit-pin-title{font-size:clamp(18px,2.5vw,26px);font-weight:900;}
.exit-pin-cancel{
  color:var(--muted);font-size:14px;font-weight:600;
  cursor:pointer;padding:8px 16px;
  border-radius:var(--r-sm);
  transition:background .15s;
}
.exit-pin-cancel:hover{background:rgba(0,0,0,0.05);}

/* ═══ KIOSK MAIN ═══ */
#kiosk{
  position:relative;z-index:1;
  width:100vw;height:100vh;
  width:100vw;height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:0;
  padding:clamp(14px,2vw,28px);
}

/* ═══ TOP BAR ═══ */
.k-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 0 clamp(14px,1.8vh,22px) 0;
  gap:16px;
}
.k-logo-area{display:flex;align-items:center;gap:clamp(10px,1.2vw,16px);}
.k-logo{
  width:clamp(38px,4.5vw,56px);height:clamp(38px,4.5vw,56px);
  border-radius:var(--r-md);overflow:hidden;flex-shrink:0;
  background:var(--surface);border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}
.k-logo img{width:100%;height:100%;object-fit:contain;}
.k-facility{
  font-size:clamp(14px,1.8vw,22px);font-weight:900;letter-spacing:-.3px;
  background:linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.k-count-name{
  font-size:clamp(11px,1.2vw,15px);color:var(--muted);font-weight:500;margin-top:2px;
  display:flex;align-items:center;gap:6px;
}

.k-total-hero{
  display:flex;flex-direction:column;align-items:center;flex:1;
}
.k-total-label{
  font-size:clamp(10px,1.1vw,13px);color:var(--muted);font-weight:600;
  letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px;
}
.k-total-num{
  font-size:clamp(52px,8vw,120px);
  font-weight:900;
  line-height:1;
  color:var(--blue);
  letter-spacing:-3px;
  transition:color .5s cubic-bezier(.4,0,.2,1);
  font-variant-numeric:tabular-nums;
  text-shadow:0 2px 20px rgba(37,99,235,0.12);
}
.k-total-num.active{color:var(--green);text-shadow:0 2px 20px rgba(16,185,129,0.15);}
.k-total-num.suspended{color:var(--amber);text-shadow:0 2px 20px rgba(217,119,6,0.12);}

.k-top-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.k-clock-hm{
  font-size:clamp(26px,3.8vw,52px);font-weight:900;letter-spacing:-1px;line-height:1;
  font-variant-numeric:tabular-nums;
  direction:ltr;unicode-bidi:isolate;
}
.k-clock-dt{font-size:clamp(11px,1.2vw,15px);color:var(--muted);font-weight:500;}
.k-live{
  display:flex;align-items:center;gap:7px;
  font-size:clamp(10px,1vw,13px);font-weight:700;color:var(--green);
  background:var(--green-soft);
  border:1px solid var(--green-border);
  border-radius:20px;padding:3px 10px 3px 8px;
  transition:all .3s;
}
.k-live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  animation:livepulse 1.8s ease-in-out infinite;
  flex-shrink:0;
}
.k-live.off{
  color:var(--muted);
  background:rgba(0,0,0,0.04);
  border-color:var(--border);
}
.k-live.off .k-live-dot{background:var(--muted);animation:none;}
.k-live.paused{
  color:var(--amber);
  background:var(--amber-soft);
  border-color:var(--amber-border);
}
.k-live.paused .k-live-dot{background:var(--amber);}

.k-suspended-badge{
  font-size:clamp(10px,1vw,13px);font-weight:800;
  color:var(--amber);
  background:var(--amber-soft);
  border:1px solid var(--amber-border);
  border-radius:20px;padding:3px 10px;
  display:none;
  align-items:center;gap:5px;
}

/* ═══ DIVIDER ═══ */
.k-divider{
  height:1px;
  background:linear-gradient(to left, transparent, var(--border2), transparent);
  margin:0;
}

/* ═══ BODY GRID ═══ */
.k-body{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(clamp(150px,19vw,270px),1fr));
  gap:clamp(10px,1.4vw,18px);
  align-content:start;
  padding:clamp(14px,1.8vh,22px) 0;
  overflow:hidden;
}

/* ═══ WING CARD ═══ */
.k-wing{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:clamp(14px,1.6vw,22px);
  display:flex;flex-direction:column;gap:4px;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  animation:fadeIn 0.35s ease-out both;
}
.k-wing:nth-child(1){animation-delay:0s}
.k-wing:nth-child(2){animation-delay:0.04s}
.k-wing:nth-child(3){animation-delay:0.08s}
.k-wing:nth-child(4){animation-delay:0.12s}
.k-wing:nth-child(5){animation-delay:0.16s}
.k-wing:nth-child(6){animation-delay:0.20s}

/* subtle top accent line */
.k-wing::before{
  content:'';position:absolute;top:0;inset-inline-start:clamp(16px,2vw,28px);inset-inline-end:clamp(16px,2vw,28px);
  height:2px;border-radius:0 0 2px 2px;
  background:var(--dim);
  opacity:0.4;
  transition:all .4s;
}
.k-wing.done{
  background:rgba(16,185,129,0.06);
  border-color:var(--green-border);
  box-shadow:0 4px 20px rgba(16,185,129,0.08);
}
.k-wing.done::before{background:var(--green);opacity:0.7;}
.k-wing.busy{
  background:rgba(217,119,6,0.05);
  border-color:var(--amber-border);
  box-shadow:0 4px 20px rgba(217,119,6,0.06);
}
.k-wing.busy::before{background:var(--amber);opacity:0.7;}

.k-wing-header{display:flex;align-items:center;justify-content:space-between;}
.k-wing-name{
  font-size:clamp(12px,1.4vw,17px);
  font-weight:600;color:var(--muted);
  display:flex;align-items:center;gap:7px;
}
.k-wing-status-badge{
  font-size:clamp(9px,0.9vw,11px);font-weight:700;
  padding:2px 8px;border-radius:20px;
  background:rgba(0,0,0,0.04);color:var(--dim);
  border:1px solid var(--border);
  transition:all .3s;
}
.k-wing.done .k-wing-status-badge{
  background:var(--green-soft);color:var(--green);border-color:var(--green-border);
}
.k-wing.busy .k-wing-status-badge{
  background:var(--amber-soft);color:var(--amber);border-color:var(--amber-border);
}

.k-wing-num{
  font-size:clamp(32px,4.5vw,62px);
  font-weight:900;line-height:1;
  color:var(--text);letter-spacing:-1.5px;
  transition:color .4s;
  font-variant-numeric:tabular-nums;
  margin:clamp(4px,0.6vw,8px) 0;
}
.k-wing.done .k-wing-num{color:var(--green);}
.k-wing.busy .k-wing-num{color:var(--amber);}

/* ═══ SECTIONS (generals / exits) ═══ */
.k-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:clamp(14px,1.6vw,22px);
  grid-column:1 / -1;
  box-shadow:var(--shadow-sm);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  animation:fadeIn 0.35s ease-out 0.2s both;
}
.k-section-title{
  font-size:clamp(10px,1.1vw,13px);
  font-weight:700;color:var(--muted);
  letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:12px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.k-section-title svg{opacity:0.5;}
.k-gen-row{
  display:flex;flex-wrap:wrap;gap:clamp(8px,1vw,14px);
}
.k-gen-item{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.025);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:clamp(8px,1vw,12px) clamp(12px,1.4vw,18px);
  transition:all .2s;
}
.k-gen-name{font-size:clamp(12px,1.3vw,16px);font-weight:500;color:var(--muted);}
.k-gen-num{
  font-size:clamp(16px,1.8vw,24px);font-weight:900;color:var(--text);
  font-variant-numeric:tabular-nums;
}
.k-gen-num.zero{color:var(--dim);}

/* ═══ BOTTOM BAR ═══ */
.k-bottom{
  padding:clamp(10px,1.4vh,18px) 0 0 0;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.k-bottom-inner{
  display:flex;align-items:center;justify-content:space-between;width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:clamp(8px,1vw,12px) clamp(12px,1.6vw,20px);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:var(--shadow-sm);
}
.k-operator{
  display:flex;align-items:center;gap:8px;
  font-size:clamp(11px,1.2vw,15px);font-weight:600;color:var(--muted);
}
.k-operator svg{opacity:0.5;}
.k-progress-wrap{
  display:flex;align-items:center;gap:10px;flex:1;justify-content:center;
  max-width:400px;
}
.k-progress-track{
  height:5px;background:rgba(0,0,0,0.06);
  border-radius:4px;flex:1;max-width:300px;overflow:hidden;
}
.k-progress-fill{
  height:100%;
  background:linear-gradient(90deg, var(--green) 0%, #34d399 100%);
  border-radius:4px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.k-progress-txt{
  font-size:clamp(11px,1.2vw,15px);font-weight:800;
  color:var(--green);white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.k-exit-btn{
  background:transparent;
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  color:var(--dim);
  font-family:'Heebo',sans-serif;
  font-size:clamp(10px,1vw,13px);font-weight:700;
  padding:clamp(6px,0.8vw,10px) clamp(10px,1.2vw,16px);
  cursor:pointer;transition:all .2s;
  white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.k-exit-btn:hover{background:rgba(0,0,0,0.04);color:var(--muted);border-color:var(--border2);}

/* ═══ OFFLINE BADGE ═══ */
#offlineBadge{
  position:fixed;bottom:16px;inset-inline-start:50%;transform:translateX(50%);
  background:var(--red-soft);border:1px solid rgba(239,68,68,0.25);
  border-radius:var(--r-md);padding:8px 16px;
  font-size:13px;font-weight:700;color:var(--red);
  display:none;z-index:100;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:var(--shadow-md);
}
#offlineBadge.show{display:flex;align-items:center;gap:6px;}

/* ═══ NO DATA STATE ═══ */
.k-no-count{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:clamp(40px,8vh,80px) 20px;text-align:center;
  grid-column:1/-1;
  animation:fadeIn 0.5s ease-out;
}
.k-no-count-icon{
  width:clamp(56px,8vw,80px);height:clamp(56px,8vw,80px);
  border-radius:50%;
  background:rgba(0,0,0,0.04);
  display:flex;align-items:center;justify-content:center;
  color:var(--dim);
}
.k-no-count-txt{font-size:clamp(16px,2vw,20px);font-weight:700;color:var(--muted);}
.k-no-count-sub{font-size:clamp(13px,1.5vw,16px);color:var(--dim);font-weight:400;max-width:300px;}

/* ═══ FULL TOTAL STRIP ═══ */
.k-full-strip{
  display:none;
  align-items:center;gap:8px;
  background:var(--amber-soft);
  border:1px solid var(--amber-border);
  border-radius:20px;padding:4px 14px;
  font-size:clamp(11px,1.2vw,14px);font-weight:600;
  color:var(--amber);
  margin-top:8px;
}
.k-full-strip.show{display:inline-flex;}
.k-full-num{font-size:clamp(14px,1.6vw,20px);font-weight:900;font-variant-numeric:tabular-nums;}

/* ═══ ANIMATIONS for value change ═══ */
.num-change{animation:countUp .35s cubic-bezier(.4,0,.2,1);}
</style>
</head>
<body>

<!-- ═══ PIN LOCK ═══ -->
<div id="pinScreen">
  <div class="pin-lock-icon">
    <svg width="clamp(24px,3.5vw,36px)" height="clamp(24px,3.5vw,36px)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <div class="pin-title">כניסה לקיוסק</div>
  <div class="pin-sub">הזן קוד גישה</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
    <div class="pin-dot" id="pd4"></div>
    <div class="pin-dot" id="pd5"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinKey('1')">1</button>
    <button class="pin-btn" onclick="pinKey('2')">2</button>
    <button class="pin-btn" onclick="pinKey('3')">3</button>
    <button class="pin-btn" onclick="pinKey('4')">4</button>
    <button class="pin-btn" onclick="pinKey('5')">5</button>
    <button class="pin-btn" onclick="pinKey('6')">6</button>
    <button class="pin-btn" onclick="pinKey('7')">7</button>
    <button class="pin-btn" onclick="pinKey('8')">8</button>
    <button class="pin-btn" onclick="pinKey('9')">9</button>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script>
/* ═══ FIREBASE ═══ */
let db = null;
try {
  firebase.initializeApp({
    apiKey:"AIzaSyBSV1dq1NgIr92wLbDelT5K6LgsOL9NQVQ",
    authDomain:"dekel-prisoner-count-fcc36.firebaseapp.com",
    databaseURL:"https://dekel-prisoner-count-fcc36-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:"dekel-prisoner-count-fcc36",
    storageBucket:"dekel-prisoner-count-fcc36.firebasestorage.app",
    messagingSenderId:"174981013586",
    appId:"1:174981013586:web:9e69e7ac42ddff46d4ff8b"
  });
  db = firebase.database();
} catch(e) { console.error('Firebase init failed:', e); }

/* ═══ DATA CONSTANTS ═══ */
const WINGS = [
  {id:'w1', name:'ורד'},
  {id:'w2', name:'חמנייה'},
  {id:'w3', name:'כלנית'},
  {id:'w4', name:'רקפת'},
  {id:'w5', name:'נרקיס'}
];
const GENERALS = ['ספרייה','חדר אוכל','מועדון','גינה','משרד ראשי'];
const EXIT_TYPES = [
  {id:'sea',     name:'ים'},
  {id:'pool',    name:'בריכה'},
  {id:'football',name:'כדורגל'},
  {id:'trip',    name:'טיול שנתי'},
  {id:'gym',     name:'חדר כושר'}
];

/* ═══ STATE ═══ */
let D = {
  wings:{}, general:{}, activeStart:null,
  winglocks:{}, customGenerals:[], operator:'',
  suspended:false, suspendedAt:null,
  exits:{}, wingExits:{}
};
let KIOSK_PIN = '999999';
let _pinBuf = '';
let _exitPinBuf = '';
let _unlocked = false;
let _prevTotal = null;

/* ═══ PIN SYSTEM ═══ */
async function loadPin() {
  if (!db) return;
  try {
    const snap = await db.ref('adminPin').once('value');
    if (snap.val()) KIOSK_PIN = snap.val();
  } catch(e) {}
}

function pinKey(k) {
  if (!k || _pinBuf.length >= 6) return;
  _pinBuf += k;
  updatePinDots(_pinBuf, 'pd');
  if (_pinBuf.length === 6) {
    setTimeout(() => checkPin(), 120);
  }
}
function pinDel() {
  if (_pinBuf.length > 0) { _pinBuf = _pinBuf.slice(0,-1); updatePinDots(_pinBuf, 'pd'); }
}
function checkPin() {
  if (_pinBuf === KIOSK_PIN) {
    _unlocked = true;
    document.getElementById('pinScreen').classList.add('hidden');
    tryFullscreen();
    render();
  } else {
    document.getElementById('pinErr').classList.add('show');
    shakeDots('pinDots');
    setTimeout(() => {
      _pinBuf = '';
      updatePinDots(_pinBuf, 'pd');
      document.getElementById('pinErr').classList.remove('show');
    }, 1000);
  }
}
function updatePinDots(buf, prefix) {
  for (let i = 0; i < 6; i++) {
    const el = document.getElementById(prefix + i);
    if (el) el.classList.toggle('filled', i < buf.length);
  }
}
function shakeDots(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  wrap.style.animation = 'none';
  wrap.offsetHeight;
  wrap.style.animation = 'shake .35s ease';
}

/* ═══ EXIT PIN ═══ */
function askExitPin() {
  _exitPinBuf = '';
  updatePinDots('', 'epd');
  document.getElementById('exitPinErr').classList.remove('show');
  document.getElementById('exitPinOverlay').classList.add('open');
}
function closeExitPin() {
  document.getElementById('exitPinOverlay').classList.remove('open');
  _exitPinBuf = '';
}
function exitPinKey(k) {
  if (!k || _exitPinBuf.length >= 6) return;
  _exitPinBuf += k;
  updatePinDots(_exitPinBuf, 'epd');
  if (_exitPinBuf.length === 6) setTimeout(() => checkExitPin(), 120);
}
function exitPinDel() {
  if (_exitPinBuf.length > 0) { _exitPinBuf = _exitPinBuf.slice(0,-1); updatePinDots(_exitPinBuf, 'epd'); }
}
function checkExitPin() {
  if (_exitPinBuf === KIOSK_PIN) {
    document.exitFullscreen && document.exitFullscreen().catch(()=>{});
    window.history.back() || (window.location.href = 'viewer.html');
  } else {
    document.getElementById('exitPinErr').classList.add('show');
    shakeDots('exitPinDots');
    setTimeout(() => {
      _exitPinBuf = '';
      updatePinDots('', 'epd');
      document.getElementById('exitPinErr').classList.remove('show');
    }, 1000);
  }
}

/* ═══ FULLSCREEN ═══ */
function tryFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

/* ═══ CLOCK ═══ */
function tickClock() {
  const now = new Date();
  const hm = now.toLocaleTimeString('he-IL',{timeZone:'Asia/Jerusalem',hour:'2-digit',minute:'2-digit'});
  const dt = now.toLocaleDateString('he-IL',{timeZone:'Asia/Jerusalem',weekday:'long',day:'numeric',month:'long'});
  document.getElementById('kClkH').textContent = hm;
  document.getElementById('kClkD').textContent = dt;
}
setInterval(tickClock, 1000);
tickClock();

/* ═══ HELPERS ═══ */
function wingTotal(wid) {
  const w = D.wings[wid] || {};
  if (w.useCell && w.cells) return Object.values(w.cells).reduce((s,v)=>s+(parseInt(v)||0), 0);
  return parseInt(w.direct) || 0;
}
function totalAll() { return WINGS.reduce((s,w)=>s+wingTotal(w.id), 0); }
function totalGen() {
  const g = [...GENERALS, ...(D.customGenerals||[])];
  return g.reduce((s,k)=>s+(parseInt((D.general||{})[k])||0), 0);
}
function totalExits() {
  const we = Object.values(D.wingExits||{}).reduce((s,o)=>s+Object.values(o||{}).reduce((ss,v)=>ss+(parseInt(v)||0),0), 0);
  const ge = Object.values(D.exits||{}).reduce((s,v)=>s+(parseInt(v)||0), 0);
  return we || ge;
}
function getCountName() {
  const n = new Date();
  const p = n.toLocaleString('he-IL',{timeZone:'Asia/Jerusalem'}).match(/(\d+)\/(\d+)\/(\d+),?\s+(\d+):(\d+)/);
  if (!p) return 'ספירה';
  const t = parseInt(p[4])*60+parseInt(p[5]);
  if (t>=9*60&&t<12*60)   return 'ספירת צהריים';
  if (t>=14*60+30&&t<17*60) return 'ספירת ביטחון';
  if (t>=19*60&&t<24*60)  return 'ספירת לילה';
  if (t>=4*60&&t<7*60+30)  return 'ספירת בוקר';
  return 'ספירה';
}

/* ═══ RENDER ═══ */
function render() {
  const isActive = !!(D.activeStart && !D.suspended);
  const isSusp   = !!(D.activeStart && D.suspended);
  const present  = totalAll() + totalGen();
  const exits    = totalExits();
  const full     = present + exits;
  const doneCnt  = WINGS.filter(w=>!!(D.wings[w.id]||{}).done).length;

  // Total number with animation
  const totEl = document.getElementById('kTotal');
  const newTotal = (isActive || isSusp) ? present : '—';
  if (totEl.textContent !== String(newTotal)) {
    totEl.textContent = newTotal;
    totEl.classList.add('num-change');
    setTimeout(() => totEl.classList.remove('num-change'), 350);
  }
  totEl.className = 'k-total-num' + (isActive?' active':isSusp?' suspended':'');

  // Full total strip (exits)
  const stripEl = document.getElementById('kFullStrip');
  if (exits > 0 && (isActive || isSusp)) {
    stripEl.classList.add('show');
    document.getElementById('kFullTotal').textContent = full;
  } else {
    stripEl.classList.remove('show');
  }

  // Count name
  document.getElementById('kCountName').textContent =
    isActive ? getCountName() + ' — פעילה' :
    isSusp   ? getCountName() + ' — מושהה' :
               'אין ספירה פעילה';

  // Live badge
  const liveEl  = document.getElementById('kLive');
  const liveTxt = document.getElementById('kLiveTxt');
  const suspBadge = document.getElementById('kSuspBadge');
  liveEl.classList.remove('off','paused');
  liveEl.style.color = '';

  if (isActive) {
    liveTxt.textContent = 'שידור חי';
    suspBadge.style.display = 'none';
  } else if (isSusp) {
    liveEl.classList.add('paused');
    liveTxt.textContent = 'מושהה';
    suspBadge.style.display = 'flex';
  } else {
    liveEl.classList.add('off');
    liveTxt.textContent = 'אין ספירה פעילה';
    suspBadge.style.display = 'none';
  }

  // Operator
  document.getElementById('kOperator').textContent = D.operator || '—';

  // Progress bar
  const progWrap = document.getElementById('kProgWrap');
  if (isActive || isSusp) {
    progWrap.style.display = 'flex';
    const pct = WINGS.length ? Math.round(doneCnt / WINGS.length * 100) : 0;
    document.getElementById('kProgFill').style.width = pct + '%';
    document.getElementById('kProgTxt').textContent  = doneCnt + '/' + WINGS.length + ' אגפים';
  } else {
    progWrap.style.display = 'none';
  }

  // Body
  const bodyEl = document.getElementById('kBody');
  if (!isActive && !isSusp) {
    bodyEl.innerHTML = `<div class="k-no-count">
      <div class="k-no-count-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <div class="k-no-count-txt">אין ספירה פעילה כרגע</div>
      <div class="k-no-count-sub">הנתונים יופיעו כאשר ספירה תתחיל</div>
    </div>`;
    return;
  }

  // Build wings cards
  const wingsHtml = WINGS.map(w => {
    const val  = wingTotal(w.id);
    const done = !!(D.wings[w.id]||{}).done;
    const busy = !!(D.winglocks||{})[w.id];
    const cls  = done ? 'done' : busy ? 'busy' : '';
    const statusTxt = done ? 'דווח' : busy ? 'בתהליך' : 'ממתין';
    return `<div class="k-wing ${cls}">
      <div class="k-wing-header">
        <div class="k-wing-name">${w.name}</div>
        <div class="k-wing-status-badge">${statusTxt}</div>
      </div>
      <div class="k-wing-num">${val || '0'}</div>
    </div>`;
  }).join('');

  // Build generals
  const gens = [...GENERALS, ...(D.customGenerals||[])].filter(g => parseInt((D.general||{})[g]) > 0);
  const gensHtml = gens.length ? `
    <div class="k-section">
      <div class="k-section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        מקומות ציבוריים
      </div>
      <div class="k-gen-row">
        ${gens.map(g => {
          const v = parseInt((D.general||{})[g]) || 0;
          return `<div class="k-gen-item">
            <div class="k-gen-name">${g}</div>
            <div class="k-gen-num${v===0?' zero':''}">${v}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // Build exits
  const allWE = Object.values(D.wingExits||{}).reduce((s,o)=>s+Object.values(o||{}).reduce((ss,v)=>ss+(parseInt(v)||0),0),0);
  const useWingExits = allWE > 0;
  const exitItems = EXIT_TYPES.map(et => {
    const v = useWingExits
      ? WINGS.reduce((s,w)=>s+(((D.wingExits||{})[w.id]||{})[et.id]||0), 0)
      : (parseInt((D.exits||{})[et.id])||0);
    return v > 0 ? `<div class="k-gen-item">
      <div class="k-gen-name">${et.name}</div>
      <div class="k-gen-num">${v}</div>
    </div>` : '';
  }).join('');
  const exitsHtml = exitItems.trim() ? `
    <div class="k-section">
      <div class="k-section-title" style="color:var(--amber)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        יציאות מאושרות
      </div>
      <div class="k-gen-row">${exitItems}</div>
    </div>` : '';

  bodyEl.innerHTML = wingsHtml + gensHtml + exitsHtml;
}

/* ═══ FIREBASE LISTENERS ═══ */
function startListeners() {
  if (!db) { render(); return; }

  db.ref('data').on('value', snap => {
    const d = snap.val() || {};
    D.wings          = d.wings          || {};
    D.general        = d.general        || {};
    D.activeStart    = d.activeStart    || null;
    D.winglocks      = d.winglocks      || {};
    D.customGenerals = d.customGenerals || [];
    D.operator       = d.operator       || '';
    D.suspended      = d.suspended      || false;
    D.suspendedAt    = d.suspendedAt    || null;
    D.exits          = d.exits          || {};
    D.wingExits      = d.wingExits      || {};
    if (_unlocked) render();
  });

  db.ref('adminPin').on('value', snap => {
    if (snap.val()) KIOSK_PIN = snap.val();
  });

  db.ref('.info/connected').on('value', snap => {
    document.getElementById('offlineBadge').classList.toggle('show', snap.val() !== true);
  });
}

/* ═══ LOGO ═══ */
function loadLogo() {
  try {
    const logoEl = document.getElementById('kLogo');
    if (logoEl) logoEl.src = '';
  } catch(e) {}
}

/* ═══ INIT ═══ */
(async function init() {
  await loadPin();
  startListeners();
})();
</script>

/* ── CONFETTI ── */
.confetti-piece{
  position:fixed;width:8px;height:8px;z-index:9999;
  pointer-events:none;border-radius:2px;
  animation:confettiFall 2.5s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1;}
  100%{transform:translateY(100vh) rotate(720deg) scale(0.3);opacity:0;}
}

/* ── RIPPLE ── */
.ripple-host{position:relative;}
.ripple-wave{
  position:absolute;border-radius:50%;
  background:rgba(0,0,0,0.06);
  transform:scale(0);animation:rippleExpand .5s ease-out forwards;
  pointer-events:none;z-index:50;
  clip-path:inset(0 0 0 0 round inherit);
  -webkit-clip-path:inset(0 0 0 0 round inherit);
}
@keyframes rippleExpand{to{transform:scale(2.5);opacity:0;}}

/* ── CLOCK TICK ── */
.k-clock-hm{
  font-variant-numeric:tabular-nums;
  transition:text-shadow .5s;
}

/* ── PROGRESS SHIMMER ── */
.k-progress-fill{
  background:linear-gradient(90deg, var(--green) 0%, #34d399 40%, var(--green) 80%);
  background-size:200% 100%;
  animation:progShimmer 3s linear infinite;
}
@keyframes progShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>

<script>
(function(){
  'use strict';

  /* ═══ RIPPLE ═══ */
  function createRipple(e){
    const el = e.currentTarget;
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width,rect.height)*2;
    const x = (e.clientX||rect.left+rect.width/2)-rect.left-size/2;
    const y = (e.clientY||rect.top+rect.height/2)-rect.top-size/2;
    const w = document.createElement('span');
    w.className='ripple-wave';
    w.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
    el.appendChild(w);
    setTimeout(()=>w.remove(),550);
  }
  function initRipples(){
    document.querySelectorAll('.pin-btn, .k-exit-btn, .exit-pin-cancel').forEach(el=>{
      if(!el.classList.contains('ripple-host')){
        el.classList.add('ripple-host');
        el.addEventListener('pointerdown',createRipple,{passive:true});
      }
    });
  }
  const mo=new MutationObserver(()=>setTimeout(initRipples,100));
  mo.observe(document.body,{childList:true,subtree:true});
  setTimeout(initRipples,500);

  /* ═══ VALUE CHANGE DETECTION ═══ */
  let _prevWingVals = {};
  let _prevTotal = null;
  function detectChanges(){
    // Wings
    document.querySelectorAll('.k-wing').forEach(wing=>{
      const name = wing.querySelector('.k-wing-name')?.textContent||'';
      const num = wing.querySelector('.k-wing-num')?.textContent||'';
      if(_prevWingVals[name] && _prevWingVals[name]!==num){
        wing.classList.remove('data-flash');
        void wing.offsetWidth;
        wing.classList.add('data-flash');
        const numEl = wing.querySelector('.k-wing-num');
        if(numEl){numEl.classList.remove('num-change');void numEl.offsetWidth;numEl.classList.add('num-change');}
      }
      _prevWingVals[name]=num;
    });
    // Total
    const totEl = document.getElementById('kTotal');
    if(totEl){
      const cur = totEl.textContent;
      if(_prevTotal && _prevTotal!==cur){
        totEl.classList.remove('num-change');
        void totEl.offsetWidth;
        totEl.classList.add('num-change');
      }
      _prevTotal=cur;
    }
  }
  setInterval(detectChanges,800);

  /* ═══ CONFETTI ON ALL DONE ═══ */
  let _prevDoneCount = 0;
  function checkAllDone(){
    const wings = document.querySelectorAll('.k-wing');
    const done = document.querySelectorAll('.k-wing.done');
    if(wings.length>0 && done.length===wings.length && _prevDoneCount<wings.length){
      fireConfetti();
    }
    _prevDoneCount = done.length;
  }
  function fireConfetti(){
    const colors = ['#10b981','#2563eb','#d97706','#6366f1','#ec4899','#14b8a6'];
    for(let i=0;i<50;i++){
      const p=document.createElement('div');
      p.className='confetti-piece';
      p.style.cssText=`left:${Math.random()*100}vw;top:-15px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-delay:${Math.random()*.8}s;animation-duration:${2+Math.random()*1.5}s;
        width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;
        border-radius:${Math.random()>.5?'50%':'2px'};`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),4000);
    }
  }
  setInterval(checkAllDone,1500);

  /* ═══ HAPTIC ═══ */
  document.addEventListener('pointerdown',function(e){
    if(e.target.closest('.pin-btn') && navigator.vibrate) navigator.vibrate(5);
  },{passive:true});

})();
</script>

<!-- Feature Pack 2 — Kiosk: Skeleton, Transitions, Status Morph -->
<style>
/* SKELETON */
.skel-wrap{display:flex;flex-wrap:wrap;gap:clamp(10px,1.4vw,18px);padding:clamp(14px,1.8vh,22px) 0;}
.skel-card{
  flex:1;min-width:clamp(150px,19vw,270px);
  border-radius:var(--r-xl);height:clamp(90px,12vw,130px);
  background:linear-gradient(90deg,rgba(0,0,0,0.03) 25%,rgba(0,0,0,0.06) 50%,rgba(0,0,0,0.03) 75%);
  background-size:200% 100%;animation:skelShimmer 1.4s ease-in-out infinite;
  border:1px solid var(--border);
}
@keyframes skelShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-fade-in{animation:skelFadeIn .4s ease-out;}
@keyframes skelFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* STATUS MORPH */
.k-wing.wing-done-morph{animation:kWingDoneMorph .6s cubic-bezier(.4,0,.2,1);}
@keyframes kWingDoneMorph{
  0%{background:var(--surface);border-color:var(--border);}
  35%{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.45);transform:scale(1.015);}
  100%{background:rgba(16,185,129,0.06);border-color:var(--green-border);transform:scale(1);}
}
.k-wing.wing-busy-morph{animation:kWingBusyMorph .5s ease-out;}
@keyframes kWingBusyMorph{
  0%{border-color:var(--border);}
  40%{border-color:rgba(217,119,6,0.6);background:rgba(217,119,6,0.10);transform:scale(1.01);}
  100%{border-color:var(--amber-border);background:rgba(217,119,6,0.05);}
}

/* ╔═══════════════════════════════════════════════════════╗
   ║      CROSS-PLATFORM COMPATIBILITY                      ║
   ╚═══════════════════════════════════════════════════════╝ */

/* Safe area for iPhone notch/Dynamic Island */
@supports(padding:max(0px)) {
  .k-header {
    padding-top: max(clamp(14px,1.8vh,24px), env(safe-area-inset-top));
    padding-left: max(clamp(16px,2vw,28px), env(safe-area-inset-left));
    padding-right: max(clamp(16px,2vw,28px), env(safe-area-inset-right));
  }
  .k-body {
    padding-bottom: max(clamp(14px,1.8vh,22px), env(safe-area-inset-bottom));
    padding-left: max(0px, env(safe-area-inset-left));
    padding-right: max(0px, env(safe-area-inset-right));
  }
}

/* Touch & scroll for kiosk mode */
.k-body {
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
  overscroll-behavior: contain;
}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
}

</style>

<script>
(function(){
  'use strict';

  /* SKELETON */
  let _kSkelShown=false;
  function showKioskSkeleton(){
    const body=document.getElementById('kBody');
    if(!body||_kSkelShown)return;
    const wings=body.querySelectorAll('.k-wing');
    if(wings.length===0&&!body.querySelector('.k-no-count')){
      let h='<div class="skel-wrap" id="kSkeleton">';
      for(let i=0;i<5;i++) h+=`<div class="skel-card" style="animation-delay:${i*0.08}s"></div>`;
      h+='</div>';
      body.innerHTML=h;
      _kSkelShown=true;
      const check=setInterval(()=>{
        const s=document.getElementById('kSkeleton');
        if(!s){clearInterval(check);return;}
        // render() will replace innerHTML when data arrives
      },300);
      setTimeout(()=>{const s=document.getElementById('kSkeleton');if(s)s.remove();clearInterval(check);},8000);
    }
  }
  setTimeout(showKioskSkeleton,100);

  /* STATUS MORPH */
  let _kPrevStatus={};
  function detectKioskMorph(){
    document.querySelectorAll('.k-wing').forEach(w=>{
      const name=w.querySelector('.k-wing-name')?.textContent||'';
      if(!name)return;
      const isDone=w.classList.contains('done');
      const isBusy=w.classList.contains('busy');
      const status=isDone?'done':isBusy?'busy':'idle';
      if(_kPrevStatus[name]&&_kPrevStatus[name]!==status){
        w.classList.remove('wing-done-morph','wing-busy-morph');
        void w.offsetWidth;
        if(status==='done'){
          w.classList.add('wing-done-morph');
          setTimeout(()=>w.classList.remove('wing-done-morph'),650);
        }else if(status==='busy'){
          w.classList.add('wing-busy-morph');
          setTimeout(()=>w.classList.remove('wing-busy-morph'),550);
        }
      }
      _kPrevStatus[name]=status;
    });
  }
  setInterval(detectKioskMorph,600);

})();
</script>
</body>
