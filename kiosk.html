<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#f0f4f8">
<title>מרכז פיקוד — תצוגת קיוסק</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  color-scheme: light only;
  --bg:#f0f4f8;
  --surface:#ffffff;
  --border:rgba(0,0,0,0.09);
  --green:#16a34a;
  --blue:#1d4ed8;
  --amber:#b45309;
  --red:#dc2626;
  --text:#0a1828;
  --muted:rgba(10,24,40,0.5);
  --dim:rgba(10,24,40,0.3);
}

html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Heebo',sans-serif;
  background:var(--bg) !important;
  color:var(--text) !important;
  color-scheme: light;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

/* ═══ BACKGROUND ═══ */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(29,78,216,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(22,163,74,0.05) 0%, transparent 55%);
  pointer-events:none;z-index:0;
}

/* ═══ PIN LOCK SCREEN ═══ */
#pinScreen{
  position:fixed;inset:0;z-index:9999;
  background:#f0f4f8 !important;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;
  backdrop-filter:blur(20px);
}
#pinScreen.hidden{display:none;}
.pin-title{font-size:clamp(22px,3vw,32px);font-weight:900;color:var(--text);letter-spacing:-.5px;}
.pin-sub{font-size:clamp(13px,1.5vw,16px);color:var(--muted);}
.pin-dots{display:flex;gap:14px;margin:8px 0;}
.pin-dot{
  width:clamp(12px,1.8vw,18px);height:clamp(12px,1.8vw,18px);
  border-radius:50%;
  background:rgba(0,0,0,0.1);
  border:2px solid rgba(0,0,0,0.15);
  transition:background .15s,border-color .15s;
}
.pin-dot.filled{background:var(--blue);border-color:var(--blue);}
.pin-pad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  width:clamp(200px,25vw,280px);
}
.pin-btn{
  background:rgba(0,0,0,0.05);
  border:1px solid rgba(0,0,0,0.1);
  border-radius:14px;
  color:var(--text);
  font-family:'Heebo',sans-serif;
  font-size:clamp(20px,2.5vw,28px);
  font-weight:700;
  height:clamp(52px,7vw,72px);
  cursor:pointer;
  transition:background .12s,transform .08s;
  display:flex;align-items:center;justify-content:center;
}
.pin-btn:active{background:rgba(29,78,216,0.15);transform:scale(.94);}
.pin-btn.del{font-size:clamp(14px,1.8vw,20px);color:var(--muted);}
.pin-err{
  color:var(--red);font-size:14px;font-weight:700;
  opacity:0;transition:opacity .2s;min-height:20px;
}
.pin-err.show{opacity:1;}

/* ═══ EXIT PIN OVERLAY ═══ */
#exitPinOverlay{
  position:fixed;inset:0;z-index:8888;
  background:#f0f4f8 !important;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;
  backdrop-filter:blur(20px);
}
#exitPinOverlay.open{display:flex;}
.exit-pin-title{font-size:clamp(18px,2.5vw,26px);font-weight:900;}
.exit-pin-cancel{
  color:var(--muted);font-size:14px;font-weight:600;
  cursor:pointer;text-decoration:underline;padding:6px;
}

/* ═══ KIOSK MAIN ═══ */
#kiosk{
  position:relative;z-index:1;
  width:100vw;height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:0;
  padding:clamp(12px,2vw,28px);
}

/* ═══ TOP BAR ═══ */
.k-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 0 clamp(12px,1.5vh,20px) 0;
  border-bottom:1px solid var(--border);
  gap:16px;
}
.k-logo-area{display:flex;align-items:center;gap:12px;}
.k-logo{width:clamp(36px,4vw,52px);height:clamp(36px,4vw,52px);border-radius:10px;overflow:hidden;flex-shrink:0;}
.k-logo img{width:100%;height:100%;object-fit:contain;}
.k-facility{font-size:clamp(14px,1.8vw,22px);font-weight:900;letter-spacing:-.3px;}
.k-count-name{font-size:clamp(11px,1.2vw,15px);color:var(--muted);font-weight:600;margin-top:2px;}

.k-total-hero{
  display:flex;flex-direction:column;align-items:center;flex:1;
}
.k-total-label{font-size:clamp(10px,1.1vw,14px);color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
.k-total-num{
  font-size:clamp(52px,8vw,110px);
  font-weight:900;
  line-height:1;
  color:var(--blue);
  letter-spacing:-3px;
  transition:color .4s;
}
.k-total-num.active{color:var(--green);}
.k-total-num.suspended{color:var(--amber);}

.k-top-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.k-clock-hm{font-size:clamp(24px,3.5vw,48px);font-weight:900;letter-spacing:-1px;line-height:1;}
.k-clock-dt{font-size:clamp(11px,1.2vw,15px);color:var(--muted);font-weight:600;}
.k-live{
  display:flex;align-items:center;gap:6px;
  font-size:clamp(10px,1vw,13px);font-weight:700;color:var(--green);
}
.k-live-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  animation:livepulse 1.8s ease-in-out infinite;
}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
.k-live.off .k-live-dot{background:var(--muted);animation:none;}
.k-live.off{color:var(--muted);}
.k-suspended-badge{
  font-size:clamp(10px,1vw,13px);font-weight:800;
  color:var(--amber);
  background:rgba(245,158,11,0.12);
  border:1px solid rgba(245,158,11,0.3);
  border-radius:6px;padding:3px 8px;
  display:none;
}

/* ═══ BODY GRID ═══ */
.k-body{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(clamp(140px,18vw,260px),1fr));
  gap:clamp(8px,1.2vw,18px);
  align-content:start;
  padding:clamp(12px,1.5vh,20px) 0;
  overflow:hidden;
}

/* ═══ WING CARD ═══ */
.k-wing{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:clamp(12px,1.5vw,20px);
  padding:clamp(12px,1.5vw,20px);
  display:flex;flex-direction:column;gap:6px;
  transition:border-color .3s,background .3s;
  position:relative;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.k-wing::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.6) 0%,transparent 60%);
  pointer-events:none;
}
.k-wing.done{
  background:rgba(22,163,74,0.07);
  border-color:rgba(22,163,74,0.3);
}
.k-wing.busy{
  background:rgba(180,83,9,0.06);
  border-color:rgba(180,83,9,0.25);
}
.k-wing-name{
  font-size:clamp(12px,1.4vw,18px);
  font-weight:700;color:var(--muted);
  display:flex;align-items:center;gap:6px;
}
.k-wing-name::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--dim);flex-shrink:0;
}
.k-wing.done .k-wing-name::before{background:var(--green);}
.k-wing.busy .k-wing-name::before{background:var(--amber);}
.k-wing-num{
  font-size:clamp(28px,4vw,58px);
  font-weight:900;line-height:1;
  color:var(--text);letter-spacing:-1px;
  transition:color .3s;
}
.k-wing.done .k-wing-num{color:var(--green);}
.k-wing.busy .k-wing-num{color:var(--amber);}
.k-wing-status{
  font-size:clamp(10px,1vw,13px);
  font-weight:700;color:var(--dim);
  margin-top:2px;
}
.k-wing.done .k-wing-status{color:rgba(34,197,94,0.6);}
.k-wing.busy .k-wing-status{color:rgba(245,158,11,0.6);}

/* ═══ GENERALS & EXITS SECTION ═══ */
.k-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:clamp(12px,1.5vw,20px);
  padding:clamp(12px,1.5vw,20px);
  grid-column:span 2;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.k-section-title{
  font-size:clamp(10px,1.1vw,14px);
  font-weight:700;color:var(--muted);
  letter-spacing:.4px;text-transform:uppercase;
  margin-bottom:10px;
  border-bottom:1px solid var(--border);
  padding-bottom:8px;
}
.k-gen-row{
  display:flex;flex-wrap:wrap;gap:clamp(8px,1vw,14px);
}
.k-gen-item{
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,0.03);
  border:1px solid rgba(0,0,0,0.07);
  border-radius:10px;
  padding:clamp(6px,0.8vw,10px) clamp(10px,1.2vw,16px);
}
.k-gen-name{font-size:clamp(12px,1.3vw,17px);font-weight:600;color:var(--muted);}
.k-gen-num{font-size:clamp(14px,1.6vw,22px);font-weight:900;color:var(--text);}
.k-gen-num.zero{color:var(--dim);}

/* ═══ BOTTOM BAR ═══ */
.k-bottom{
  border-top:1px solid var(--border);
  padding:clamp(8px,1.2vh,16px) 0 0 0;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.k-operator{
  display:flex;align-items:center;gap:6px;
  font-size:clamp(11px,1.2vw,15px);font-weight:700;color:var(--muted);
}
.k-progress-wrap{
  display:flex;align-items:center;gap:10px;flex:1;justify-content:center;
}
.k-progress-track{
  height:6px;background:rgba(0,0,0,0.08);
  border-radius:3px;flex:1;max-width:300px;overflow:hidden;
}
.k-progress-fill{
  height:100%;background:var(--green);
  border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);
}
.k-progress-txt{
  font-size:clamp(11px,1.2vw,15px);font-weight:800;
  color:var(--green);white-space:nowrap;
}
.k-exit-btn{
  background:rgba(0,0,0,0.04);
  border:1px solid rgba(0,0,0,0.1);
  border-radius:10px;
  color:var(--dim);
  font-family:'Heebo',sans-serif;
  font-size:clamp(10px,1vw,13px);font-weight:700;
  padding:clamp(6px,0.8vw,10px) clamp(10px,1.2vw,16px);
  cursor:pointer;transition:background .15s,color .15s;
  white-space:nowrap;
}
.k-exit-btn:hover{background:rgba(0,0,0,0.08);color:var(--text);}

/* ═══ OFFLINE BADGE ═══ */
#offlineBadge{
  position:fixed;inset-block-end:16px;inset-inline-start:50%;transform:translateX(50%);
  background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);
  border-radius:8px;padding:6px 14px;
  font-size:13px;font-weight:700;color:var(--red);
  display:none;z-index:100;
}
#offlineBadge.show{display:flex;align-items:center;gap:6px;}

/* ═══ NO DATA STATE ═══ */
.k-no-count{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:40px;text-align:center;
  grid-column:1/-1;
}
.k-no-count-icon{font-size:48px;opacity:.3;}
.k-no-count-txt{font-size:18px;font-weight:700;color:var(--muted);}
.k-no-count-sub{font-size:14px;color:var(--dim);}

/* ═══ FULL TOTAL STRIP ═══ */
.k-full-strip{
  display:none;
  align-items:center;gap:10px;
  background:rgba(245,158,11,0.07);
  border:1px solid rgba(245,158,11,0.2);
  border-radius:10px;padding:6px 14px;
  font-size:clamp(11px,1.2vw,15px);font-weight:700;
  color:var(--amber);
}
.k-full-strip.show{display:flex;}
.k-full-num{font-size:clamp(16px,2vw,24px);font-weight:900;}

/* ═══ RESPONSIVE — TV / DESKTOP LARGE ═══ */
@media(min-width:1280px){
  #kiosk{padding:clamp(20px,2.5vw,40px);}
  .k-total-num{font-size:clamp(80px,9vw,140px);}
  .k-clock-hm{font-size:clamp(36px,4vw,60px);}
  .k-facility{font-size:clamp(18px,2vw,28px);}
  .k-wing-num{font-size:clamp(40px,5vw,72px);}
  .k-wing-name{font-size:clamp(16px,1.6vw,22px);}
  .k-wing{padding:clamp(16px,2vw,28px);}
  .k-gen-name{font-size:clamp(15px,1.5vw,20px);}
  .k-gen-num{font-size:clamp(18px,2vw,28px);}
  .k-progress-track{max-width:500px;}
}
@media(min-width:1920px){
  /* 1080p TV / 4K */
  .k-total-num{font-size:clamp(100px,9vw,170px);}
  .k-clock-hm{font-size:clamp(48px,4vw,72px);}
  .k-clock-dt{font-size:clamp(14px,1.2vw,20px);}
  .k-facility{font-size:clamp(22px,2vw,34px);}
  .k-count-name{font-size:clamp(14px,1.2vw,20px);}
  .k-wing-num{font-size:clamp(52px,5vw,90px);}
  .k-wing-name{font-size:clamp(18px,1.5vw,26px);}
  .k-wing-status{font-size:clamp(13px,1vw,17px);}
  .k-gen-name{font-size:clamp(16px,1.4vw,22px);}
  .k-gen-num{font-size:clamp(22px,2vw,32px);}
  .k-body{gap:clamp(12px,1.5vw,24px);}
  .k-logo{width:clamp(52px,5vw,72px);height:clamp(52px,5vw,72px);}
}
@media(min-width:3840px){
  /* 4K UHD */
  .k-total-num{font-size:clamp(140px,8vw,220px);}
  .k-clock-hm{font-size:clamp(60px,3.5vw,96px);}
  .k-wing-num{font-size:clamp(70px,5vw,120px);}
  .k-wing-name{font-size:clamp(24px,1.4vw,36px);}
}

/* ═══ PHONE / SMALL TABLET ═══ */
@media(max-width:600px){
  .k-top{flex-wrap:wrap;gap:10px;}
  .k-total-hero{order:-1;width:100%;flex-direction:row;align-items:baseline;justify-content:center;gap:12px;}
  .k-total-label{font-size:12px;}
  .k-total-num{font-size:clamp(42px,14vw,72px);}
  .k-logo{display:none;}
  .k-facility{font-size:14px;}
  .k-top-right{flex-direction:row;align-items:center;flex-wrap:wrap;}
  .k-clock-hm{font-size:22px;}
  .k-body{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));}
  .k-wing-num{font-size:clamp(22px,8vw,42px);}
  .k-section{grid-column:span 1;}
}
</style>
</head>
<body>

<!-- ═══ PIN LOCK ═══ -->
<div id="pinScreen">
  <div class="pin-title" style="display:flex;align-items:center;gap:10px">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    כניסה לקיוסק
  </div>
  <div class="pin-sub">הזן קוד גישה</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
    <div class="pin-dot" id="pd4"></div>
    <div class="pin-dot" id="pd5"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinKey('1')">1</button>
    <button class="pin-btn" onclick="pinKey('2')">2</button>
    <button class="pin-btn" onclick="pinKey('3')">3</button>
    <button class="pin-btn" onclick="pinKey('4')">4</button>
    <button class="pin-btn" onclick="pinKey('5')">5</button>
    <button class="pin-btn" onclick="pinKey('6')">6</button>
    <button class="pin-btn" onclick="pinKey('7')">7</button>
    <button class="pin-btn" onclick="pinKey('8')">8</button>
    <button class="pin-btn" onclick="pinKey('9')">9</button>
    <button class="pin-btn" onclick="pinKey('')" style="opacity:.3"></button>
    <button class="pin-btn" onclick="pinKey('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-err" id="pinErr">קוד שגוי, נסה שוב</div>
</div>

<!-- ═══ EXIT PIN OVERLAY ═══ -->
<div id="exitPinOverlay">
  <div class="exit-pin-title">הזן קוד כדי לצאת</div>
  <div class="pin-dots" id="exitPinDots">
    <div class="pin-dot" id="epd0"></div>
    <div class="pin-dot" id="epd1"></div>
    <div class="pin-dot" id="epd2"></div>
    <div class="pin-dot" id="epd3"></div>
    <div class="pin-dot" id="epd4"></div>
    <div class="pin-dot" id="epd5"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="exitPinKey('1')">1</button>
    <button class="pin-btn" onclick="exitPinKey('2')">2</button>
    <button class="pin-btn" onclick="exitPinKey('3')">3</button>
    <button class="pin-btn" onclick="exitPinKey('4')">4</button>
    <button class="pin-btn" onclick="exitPinKey('5')">5</button>
    <button class="pin-btn" onclick="exitPinKey('6')">6</button>
    <button class="pin-btn" onclick="exitPinKey('7')">7</button>
    <button class="pin-btn" onclick="exitPinKey('8')">8</button>
    <button class="pin-btn" onclick="exitPinKey('9')">9</button>
    <button class="pin-btn" onclick="exitPinKey('')" style="opacity:.3"></button>
    <button class="pin-btn" onclick="exitPinKey('0')">0</button>
    <button class="pin-btn del" onclick="exitPinDel()">⌫</button>
  </div>
  <div class="pin-err" id="exitPinErr">קוד שגוי, נסה שוב</div>
  <div class="exit-pin-cancel" onclick="closeExitPin()">ביטול</div>
</div>

<!-- ═══ OFFLINE ═══ -->
<div id="offlineBadge" style="display:flex;align-items:center;gap:6px">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  אין חיבור לרשת
</div>

<!-- ═══ MAIN KIOSK ═══ -->
<div id="kiosk">

  <!-- TOP -->
  <div class="k-top">
    <div class="k-logo-area">
      <div class="k-logo"><img id="kLogo" src="" alt="" onerror="this.style.display='none'"></div>
      <div>
        <div class="k-facility">בית הסוהר אביבים</div>
        <div class="k-count-name" id="kCountName">אין ספירה פעילה</div>
      </div>
    </div>

    <div class="k-total-hero">
      <div class="k-total-label">סה״כ במקום</div>
      <div class="k-total-num" id="kTotal">—</div>
      <div class="k-full-strip" id="kFullStrip">
        <span>כולל יציאות:</span>
        <span class="k-full-num" id="kFullTotal">0</span>
      </div>
    </div>

    <div class="k-top-right">
      <div class="k-clock-hm" id="kClkH">00:00</div>
      <div class="k-clock-dt" id="kClkD"></div>
      <div class="k-live off" id="kLive">
        <div class="k-live-dot"></div>
        <span id="kLiveTxt">מחכה לנתונים</span>
      </div>
      <div class="k-suspended-badge" id="kSuspBadge" style="display:none;align-items:center;gap:5px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        מושהה
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div class="k-body" id="kBody">
    <div class="k-no-count">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" style="opacity:.25"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <div class="k-no-count-txt">אין ספירה פעילה כרגע</div>
      <div class="k-no-count-sub">הנתונים יופיעו כאשר ספירה תתחיל</div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="k-bottom">
    <div class="k-operator">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span id="kOperator">—</span>
    </div>
    <div class="k-progress-wrap" id="kProgWrap" style="display:none">
      <div class="k-progress-track"><div class="k-progress-fill" id="kProgFill" style="width:0%"></div></div>
      <div class="k-progress-txt" id="kProgTxt">0/0</div>
    </div>
    <button class="k-exit-btn" onclick="askExitPin()" style="display:flex;align-items:center;gap:6px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      יציאה
    </button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
/* ═══ FIREBASE ═══ */
let db = null;
try {
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey:"AIzaSyBSV1dq1NgIr92wLbDelT5K6LgsOL9NQVQ",
      authDomain:"dekel-prisoner-count-fcc36.firebaseapp.com",
      databaseURL:"https://dekel-prisoner-count-fcc36-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:"dekel-prisoner-count-fcc36",
      storageBucket:"dekel-prisoner-count-fcc36.firebasestorage.app",
      messagingSenderId:"174981013586",
      appId:"1:174981013586:web:9e69e7ac42ddff46d4ff8b"
    });
  }
  db = firebase.database();
} catch(e) { console.error('Firebase init failed:', e); }

/* ═══ DATA CONSTANTS ═══ */
const WINGS = [
  {id:'w1', name:'ורד'},
  {id:'w2', name:'חמנייה'},
  {id:'w3', name:'כלנית'},
  {id:'w4', name:'רקפת'},
  {id:'w5', name:'נרקיס'}
];
const GENERALS = ['ספרייה','חדר אוכל','מועדון','גינה','משרד ראשי'];
const EXIT_TYPES = [
  {id:'sea',     name:'ים'},
  {id:'pool',    name:'בריכה'},
  {id:'football',name:'כדורגל'},
  {id:'trip',    name:'טיול שנתי'},
  {id:'gym',     name:'חדר כושר'}
];

/* ═══ STATE ═══ */
let D = {
  wings:{}, general:{}, activeStart:null,
  winglocks:{}, customGenerals:[], operator:'',
  suspended:false, suspendedAt:null,
  exits:{}, wingExits:{}
};
let KIOSK_PIN = '999999';
let _pinBuf = '';
let _exitPinBuf = '';
let _unlocked = false;

/* ═══ PIN SYSTEM ═══ */
async function loadPin() {
  if (!db) return;
  try {
    const snap = await db.ref('adminPin').once('value');
    if (snap.val()) KIOSK_PIN = snap.val();
  } catch(e) {}
}

function pinKey(k) {
  if (!k || _pinBuf.length >= 6) return;
  _pinBuf += k;
  updatePinDots(_pinBuf, 'pd');
  if (_pinBuf.length === 6) {
    setTimeout(() => checkPin(), 120);
  }
}
function pinDel() {
  if (_pinBuf.length > 0) { _pinBuf = _pinBuf.slice(0,-1); updatePinDots(_pinBuf, 'pd'); }
}
function checkPin() {
  if (_pinBuf === KIOSK_PIN) {
    _unlocked = true;
    document.getElementById('pinScreen').classList.add('hidden');
    tryFullscreen();
  } else {
    document.getElementById('pinErr').classList.add('show');
    shakeDots('pd');
    setTimeout(() => {
      _pinBuf = '';
      updatePinDots(_pinBuf, 'pd');
      document.getElementById('pinErr').classList.remove('show');
    }, 1000);
  }
}
function updatePinDots(buf, prefix) {
  for (let i = 0; i < 6; i++) {
    const el = document.getElementById(prefix + i);
    if (el) el.classList.toggle('filled', i < buf.length);
  }
}
function shakeDots(prefix) {
  const wrap = document.getElementById('pinDots') || document.getElementById('exitPinDots');
  if (!wrap) return;
  wrap.style.animation = 'none';
  wrap.offsetHeight;
  wrap.style.animation = 'shake .35s ease';
}

/* ═══ EXIT PIN ═══ */
function askExitPin() {
  _exitPinBuf = '';
  updatePinDots('', 'epd');
  document.getElementById('exitPinErr').classList.remove('show');
  document.getElementById('exitPinOverlay').classList.add('open');
}
function closeExitPin() {
  document.getElementById('exitPinOverlay').classList.remove('open');
  _exitPinBuf = '';
}
function exitPinKey(k) {
  if (!k || _exitPinBuf.length >= 6) return;
  _exitPinBuf += k;
  updatePinDots(_exitPinBuf, 'epd');
  if (_exitPinBuf.length === 6) setTimeout(() => checkExitPin(), 120);
}
function exitPinDel() {
  if (_exitPinBuf.length > 0) { _exitPinBuf = _exitPinBuf.slice(0,-1); updatePinDots(_exitPinBuf, 'epd'); }
}
function checkExitPin() {
  if (_exitPinBuf === KIOSK_PIN) {
    document.exitFullscreen && document.exitFullscreen().catch(()=>{});
    window.history.back() || (window.location.href = 'viewer.html');
  } else {
    document.getElementById('exitPinErr').classList.add('show');
    setTimeout(() => {
      _exitPinBuf = '';
      updatePinDots('', 'epd');
      document.getElementById('exitPinErr').classList.remove('show');
    }, 1000);
  }
}

/* shake keyframe */
const style = document.createElement('style');
style.textContent = `@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}`;
document.head.appendChild(style);

/* ═══ FULLSCREEN ═══ */
function tryFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

/* ═══ CLOCK ═══ */
function tickClock() {
  const now = new Date();
  const hm = now.toLocaleTimeString('he-IL',{timeZone:'Asia/Jerusalem',hour:'2-digit',minute:'2-digit'});
  const dt = now.toLocaleDateString('he-IL',{timeZone:'Asia/Jerusalem',weekday:'long',day:'numeric',month:'long'});
  document.getElementById('kClkH').textContent = hm;
  document.getElementById('kClkD').textContent = dt;
}
let _clockId = setInterval(tickClock, 1000);
tickClock();

/* ═══ HELPERS ═══ */
function wingTotal(wid) {
  const w = D.wings[wid] || {};
  if (w.useCell && w.cells) return Object.values(w.cells).reduce((s,v)=>s+(parseInt(v)||0), 0);
  return parseInt(w.direct) || 0;
}
function totalAll() { return WINGS.reduce((s,w)=>s+wingTotal(w.id), 0); }
function totalGen() {
  const g = [...GENERALS, ...(D.customGenerals||[])];
  return g.reduce((s,k)=>s+(parseInt((D.general||{})[k])||0), 0);
}
function totalExits() {
  const we = Object.values(D.wingExits||{}).reduce((s,o)=>s+Object.values(o||{}).reduce((ss,v)=>ss+(parseInt(v)||0),0), 0);
  const ge = Object.values(D.exits||{}).reduce((s,v)=>s+(parseInt(v)||0), 0);
  return we || ge;
}
function getCountName() {
  const n = new Date();
  const p = n.toLocaleString('he-IL',{timeZone:'Asia/Jerusalem'}).match(/(\d+)\/(\d+)\/(\d+),?\s+(\d+):(\d+)/);
  if (!p) return 'ספירה';
  const t = parseInt(p[4])*60+parseInt(p[5]);
  if (t>=9*60&&t<12*60)   return 'ספירת צהריים';
  if (t>=14*60+30&&t<17*60) return 'ספירת ביטחון';
  if (t>=19*60&&t<24*60)  return 'ספירת לילה';
  if (t>=4*60&&t<7*60+30)  return 'ספירת בוקר';
  return 'ספירה';
}

/* ═══ RENDER ═══ */
function render() {
  const isActive = !!(D.activeStart && !D.suspended);
  const isSusp   = !!(D.activeStart && D.suspended);
  const present  = totalAll() + totalGen();
  const exits    = totalExits();
  const full     = present + exits;
  const doneCnt  = WINGS.filter(w=>!!(D.wings[w.id]||{}).done).length;

  // Total number
  const totEl = document.getElementById('kTotal');
  totEl.textContent = (isActive || isSusp) ? present : '—';
  totEl.className   = 'k-total-num' + (isActive?' active':isSusp?' suspended':'');

  // Full total strip (exits)
  const stripEl = document.getElementById('kFullStrip');
  if (exits > 0 && (isActive || isSusp)) {
    stripEl.classList.add('show');
    document.getElementById('kFullTotal').textContent = full;
  } else {
    stripEl.classList.remove('show');
  }

  // Count name
  document.getElementById('kCountName').textContent =
    isActive ? getCountName() + ' — פעילה' :
    isSusp   ? getCountName() + ' — מושהה' :
               'אין ספירה פעילה';

  // Live badge
  const liveEl  = document.getElementById('kLive');
  const liveTxt = document.getElementById('kLiveTxt');
  const suspBadge = document.getElementById('kSuspBadge');
  if (isActive) {
    liveEl.classList.remove('off');
    liveTxt.textContent = 'שידור חי';
    suspBadge.style.display = 'none';
  } else if (isSusp) {
    liveEl.classList.remove('off');
    liveEl.style.color = 'var(--amber)';
    liveTxt.textContent = 'מושהה';
    suspBadge.style.display = 'flex';
  } else {
    liveEl.classList.add('off');
    liveEl.style.color = '';
    liveTxt.textContent = 'אין ספירה פעילה';
    suspBadge.style.display = 'none';
  }

  // Operator
  const op = D.operator || '—';
  document.getElementById('kOperator').textContent = op;

  // Progress bar
  const progWrap = document.getElementById('kProgWrap');
  if (isActive || isSusp) {
    progWrap.style.display = 'flex';
    const pct = WINGS.length ? Math.round(doneCnt / WINGS.length * 100) : 0;
    document.getElementById('kProgFill').style.width = pct + '%';
    document.getElementById('kProgTxt').textContent  = doneCnt + '/' + WINGS.length + ' אגפים';
  } else {
    progWrap.style.display = 'none';
  }

  // Body
  const bodyEl = document.getElementById('kBody');
  if (!isActive && !isSusp) {
    bodyEl.innerHTML = `<div class="k-no-count">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" style="opacity:.25"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    <div class="k-no-count-txt">אין ספירה פעילה כרגע</div>
    <div class="k-no-count-sub">הנתונים יופיעו כאשר ספירה תתחיל</div>
  </div>`;
    return;
  }

  // Build wings cards
  const wingsHtml = WINGS.map(w => {
    const val  = wingTotal(w.id);
    const done = !!(D.wings[w.id]||{}).done;
    const busy = !!(D.winglocks||{})[w.id];
    const cls  = done ? 'done' : busy ? 'busy' : '';
    const status = done ? 'דווח' : busy ? 'בתהליך' : 'ממתין';
    return `<div class="k-wing ${cls}">
      <div class="k-wing-name">${w.name}</div>
      <div class="k-wing-num">${val || '0'}</div>
      <div class="k-wing-status">${status}</div>
    </div>`;
  }).join('');

  // Build generals
  const gens = [...GENERALS, ...(D.customGenerals||[])].filter(g => parseInt((D.general||{})[g]) > 0);
  const gensHtml = gens.length ? `
    <div class="k-section">
      <div class="k-section-title">מקומות ציבוריים</div>
      <div class="k-gen-row">
        ${gens.map(g => {
          const v = parseInt((D.general||{})[g]) || 0;
          return `<div class="k-gen-item">
            <div class="k-gen-name">${g}</div>
            <div class="k-gen-num${v===0?' zero':''}">${v}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // Build exits (only when > 0)
  const allWE = Object.values(D.wingExits||{}).reduce((s,o)=>s+Object.values(o||{}).reduce((ss,v)=>ss+(parseInt(v)||0),0),0);
  const allGE = Object.values(D.exits||{}).reduce((s,v)=>s+(parseInt(v)||0),0);
  const useWingExits = allWE > 0;
  const exitItems = EXIT_TYPES.map(et => {
    const v = useWingExits
      ? WINGS.reduce((s,w)=>s+(((D.wingExits||{})[w.id]||{})[et.id]||0), 0)
      : (parseInt((D.exits||{})[et.id])||0);
    return v > 0 ? `<div class="k-gen-item">
      <div class="k-gen-name">${et.name}</div>
      <div class="k-gen-num">${v}</div>
    </div>` : '';
  }).join('');
  const exitsHtml = exitItems.trim() ? `
    <div class="k-section">
      <div class="k-section-title" style="color:var(--amber)">יציאות מאושרות</div>
      <div class="k-gen-row">${exitItems}</div>
    </div>` : '';

  bodyEl.innerHTML = wingsHtml + gensHtml + exitsHtml;
}

/* ═══ FIREBASE LISTENERS ═══ */
function startListeners() {
  if (!db) { render(); return; }

  db.ref('data').on('value', snap => {
    const d = snap.val() || {};
    D.wings          = d.wings          || {};
    D.general        = d.general        || {};
    D.activeStart    = d.activeStart    || null;
    D.winglocks      = d.winglocks      || {};
    D.customGenerals = d.customGenerals || [];
    D.operator       = d.operator       || '';
    D.suspended      = d.suspended      || false;
    D.suspendedAt    = d.suspendedAt    || null;
    D.exits          = d.exits          || {};
    D.wingExits      = d.wingExits      || {};
    if (_unlocked) render();
  });

  db.ref('adminPin').on('value', snap => {
    if (snap.val()) KIOSK_PIN = snap.val();
  });

  // Reconnect handler
  db.ref('.info/connected').on('value', snap => {
    document.getElementById('offlineBadge').classList.toggle('show', snap.val() !== true);
  });
}

/* ═══ KEYBOARD PIN SUPPORT ═══ */
document.addEventListener('keydown', e => {
  if (!_unlocked) {
    const overlay = document.getElementById('exitPinOverlay');
    const isExitOpen = overlay && overlay.classList.contains('open');
    if (e.key >= '0' && e.key <= '9') { isExitOpen ? exitPinKey(e.key) : pinKey(e.key); }
    else if (e.key === 'Backspace') { isExitOpen ? exitPinDel() : pinDel(); }
    else if (e.key === 'Enter' && !isExitOpen && _pinBuf.length === 6) checkPin();
  }
});

/* ═══ LOGO ═══ */
function loadLogo() {
  /* logo loading via Firebase or shared state — placeholder */
}

/* ═══ INIT ═══ */
(async function init() {
  await loadPin();
  startListeners();
})();
</script>
</body>
</html>
