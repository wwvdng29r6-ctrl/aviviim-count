<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, viewport-fit=cover">
<title>אביבים — מרכז פיקוד וספירה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<!-- SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --bg:#06090d; --s1:#0b1018; --s2:#101620; --s3:#161e2a; --s4:#1d2635;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.12);
  --text:#dde6f0; --muted:#8aa4bf; --dim:#5a7a96;
  --accent:#2d72c8; --accent-glow:rgba(45,114,200,0.3);
  --green:#1db954; --green-dim:rgba(29,185,84,0.1); --green-border:rgba(29,185,84,0.3);
  --amber:#e09b35; --amber-dim:rgba(224,155,53,0.1);
  --red:#e04040; --gold:#c8a84b;
}

body.light {
  --bg:#e4edf8; --s1:rgba(255,255,255,0.85); --s2:rgba(248,252,255,0.75);
  --s3:rgba(220,232,248,0.60); --s4:rgba(200,218,240,0.70);
  --border:rgba(150,190,235,0.35); --border2:rgba(130,178,225,0.50);
  --text:#0a1828; --muted:#46617e; --dim:#7a9ab8;
  --accent:#1550b8; --green:#087832; --amber:#925208; --red:#a01414;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; font-family:'Heebo', sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; }

body {
  display:flex; flex-direction:column;
  background: var(--bg);
  transition: background .3s, color .3s;
}

body.dark {
    background: radial-gradient(ellipse at 15% 10%, rgba(45,114,200,0.13) 0%, transparent 48%),
                radial-gradient(ellipse at 85% 88%, rgba(29,185,84,0.07) 0%, transparent 44%),
                linear-gradient(160deg,#06090d 0%,#050810 100%);
}

.scroll-area { flex:1; overflow-y:auto; padding:12px 14px 100px; -webkit-overflow-scrolling:touch; }

/* TOPBAR */
.topbar {
  background:var(--s1); border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); z-index:100;
}
.logo-wrap { display:flex; align-items:center; gap:10px; }
.logo-img { width:45px; height:45px; object-fit:contain; }
.app-title { font-size:16px; font-weight:900; letter-spacing:-0.5px; }
.app-sub { font-size:10px; color:var(--muted); font-weight:600; }

/* STATS STRIP */
.stats-strip {
  display:flex; gap:8px; padding:10px 14px; overflow-x:auto; flex-shrink:0;
}
.stat-cell {
  flex:1; min-width:100px; background:var(--s2); border:1px solid var(--border);
  padding:10px; border-radius:14px; text-align:center;
}
.stat-num { font-size:24px; font-weight:900; line-height:1; }
.stat-lbl { font-size:10px; color:var(--muted); font-weight:700; margin-top:4px; text-transform:uppercase; }

/* NAV BAR */
.nav-bar {
  display:flex; background:var(--s1); border-bottom:1px solid var(--border); padding:0 10px; gap:4px;
}
.nav-t {
  flex:1; padding:12px 5px; text-align:center; font-size:13px; font-weight:800;
  color:var(--muted); cursor:pointer; border-bottom:3px solid transparent;
}
.nav-t.active { color:var(--accent); border-bottom-color:var(--accent); }

/* WING CARDS (Input Mode) */
.wing-card {
  background:var(--s2); border:1px solid var(--border); border-radius:16px;
  margin-bottom:10px; overflow:hidden;
}
.wing-card.done { border-color:var(--green-border); background:var(--green-dim); }
.wing-card.busy { border-color:var(--amber); border-style: dashed; }
.wing-main { display:flex; align-items:center; padding:12px 15px; gap:12px; }
.wing-info { flex:1; }
.wing-name { font-size:15px; font-weight:900; }
.wing-right { display:flex; align-items:center; gap:10px; }
.big-inp {
  width:70px; background:var(--s3); border:1px solid var(--border);
  border-radius:10px; padding:8px 5px; text-align:center;
  color:var(--text); font-size:22px; font-weight:900; outline:none;
}

/* MAP CELL (Viewer Mode) */
.map-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(100px, 1fr)); gap:10px; }
.map-cell {
  background:var(--s2); border:1px solid var(--border); border-radius:14px;
  padding:15px 10px; text-align:center; position:relative;
}
.map-cell.done { border-color:var(--green); color:var(--green); }
.map-cell-name { font-size:12px; font-weight:700; margin-bottom:5px; }
.map-cell-num { font-size:24px; font-weight:900; }

/* CHAT FAB */
.chat-fab {
  position:fixed; bottom:85px; left:20px; width:50px; height:50px;
  background:var(--accent); border-radius:50%; display:flex;
  align-items:center; justify-content:center; color:#fff;
  box-shadow:0 4px 15px rgba(0,0,0,0.3); cursor:pointer; z-index:150;
}

/* OVERLAYS */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000;
  display:none; align-items:flex-end; justify-content:center;
}
.overlay.open { display:flex; }
.sheet {
  background:var(--s1); width:100%; max-width:500px; border-radius:20px 20px 0 0;
  padding:20px; max-height:85vh; overflow-y:auto;
}

/* UTILS */
.pulse-dot { width:8px; height:8px; background:var(--green); border-radius:50%; animation:pulse 1.5s infinite; }
@keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(0.95); opacity: 1; } }

/* NUMPAD */
.numpad {
  display:none; position:fixed; bottom:0; left:0; right:0; background:var(--s1);
  padding:15px; grid-template-columns:repeat(3, 1fr); gap:10px; z-index:2000;
  border-top:1px solid var(--border);
}
.num-btn { background:var(--s3); padding:15px; text-align:center; border-radius:10px; font-size:20px; font-weight:900; }

</style>
</head>
<body class="dark">

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
    <img src="" id="loginLogo" style="width:120px; margin-bottom:30px;">
    <h2 style="margin-bottom:10px;">כניסה למערכת</h2>
    <input type="number" id="personalId" placeholder="מספר אישי" style="width:100%; max-width:300px; padding:15px; border-radius:12px; border:1px solid var(--border); background:var(--s2); color:#fff; text-align:center; font-size:18px; margin-bottom:15px;">
    <button onclick="login()" style="width:100%; max-width:300px; padding:15px; border-radius:12px; background:var(--accent); color:#fff; font-weight:900; border:none; cursor:pointer;">כניסה</button>
</div>

<!-- TOPBAR -->
<div class="topbar">
    <div class="logo-wrap">
        <img src="" class="logo-img" id="topLogo">
        <div class="titles">
            <div class="app-title">מרכז פיקוד וספירה</div>
            <div class="app-sub" id="countStatus">ממתין לספירה...</div>
        </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <div id="userNameDisplay" style="font-size:12px; font-weight:700; color:var(--muted);"></div>
        <div class="icon-btn" onclick="toggleTheme()" style="cursor:pointer;">🌓</div>
    </div>
</div>

<!-- STATS STRIP -->
<div class="stats-strip">
    <div class="stat-cell">
        <div class="stat-num" id="statPresent">0</div>
        <div class="stat-lbl">במקום</div>
    </div>
    <div class="stat-cell">
        <div class="stat-num" id="statExits">0</div>
        <div class="stat-lbl">יציאות</div>
    </div>
    <div class="stat-cell">
        <div class="stat-num" id="statTotal" style="color:var(--accent)">0</div>
        <div class="stat-lbl">מצבה</div>
    </div>
</div>

<!-- NAVIGATION -->
<div class="nav-bar">
    <div class="nav-t active" onclick="switchTab('map')">מפה</div>
    <div class="nav-t" onclick="switchTab('count')">ספירה</div>
    <div class="nav-t" onclick="switchTab('users')">משתמשים</div>
    <div class="nav-t" onclick="switchTab('log')">לוג</div>
</div>

<!-- MAIN CONTENT -->
<div class="scroll-area" id="mainContent">
    <!-- Content will be injected here -->
</div>

<!-- CHAT FAB -->
<div class="chat-fab" onclick="openChat()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
</div>

<!-- OVERLAYS -->
<div class="overlay" id="genericOverlay" onclick="closeOverlay()">
    <div class="sheet" onclick="event.stopPropagation()">
        <h3 id="overlayTitle" style="margin-bottom:15px;">כותרת</h3>
        <div id="overlayBody"></div>
        <button onclick="closeOverlay()" style="width:100%; margin-top:20px; padding:12px; border-radius:10px; background:var(--s3); color:var(--text); border:none;">סגור</button>
    </div>
</div>

<script>
/* ═══ CONFIG ═══ */
const WINGS = [
    {id:'w1', name:'ורד', cells:5},
    {id:'w2', name:'חמנייה', cells:5},
    {id:'w3', name:'כלנית', cells:5},
    {id:'w4', name:'רקפת', cells:5},
    {id:'w5', name:'נרקיס', cells:5}
];
const GENERAL_AREAS = ['ספרייה', 'חדר אוכל', 'מועדון', 'גינה', 'משרד ראשי'];
const LOGO_BASE64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA4QAAAFzCAYAAABmRsezAAAAAXNSR0IArs4c6QAAAIRlWElmTU0AKgAAAAgABQESAAMAAAABAAEAAAEaAAUAAAABAAAASgEbAAUAAAABAAAAUgEoAAMAAAABAAIAAIdpAAQAAAABAAAAWgAAAAAAAABIAAAAAQAAAEgAAAABAAOgAQADAAAAAQABAACgAgAEAAAAAQAAAiOgAwAEAAAAAQAAAhcAAAAAVzv6agAAAAlwSFlzAAALEwAACxMBAJqcGAAAABxpRE9UAAAAAgAAAAAAAAEMAAAAKAAAAQwAAAELAAGwjPU0GL8AAEAASURBVH..."; // Shortened for brevity

/* ═══ STATE ═══ */
let currentUser = null;
let currentTab = 'map';
let dbData = { wings: {}, general: {}, activeStart: null, winglocks: {}, log: [], archive: [], presence: {} };

/* ═══ INIT ═══ */
document.getElementById('loginLogo').src = LOGO_BASE64;
document.getElementById('topLogo').src = LOGO_BASE64;

function login() {
    const id = document.getElementById('personalId').value;
    if (id.length < 4) return alert("אנא הכנס מספר אישי תקין");
    
    // In real app, verify against DB. Here we simulate.
    currentUser = { id: id, name: "סוהר " + id };
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('userNameDisplay').textContent = currentUser.name;
    
    initFirebase();
}

function initFirebase() {
    const firebaseConfig = {
        apiKey: "AIzaSyBSV1dq1NgIr92wLbDelT5K6LgsOL9NQVQ",
        authDomain: "dekel-prisoner-count-fcc36.firebaseapp.com",
        databaseURL: "https://dekel-prisoner-count-fcc36-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dekel-prisoner-count-fcc36",
        storageBucket: "dekel-prisoner-count-fcc36.firebasestorage.app",
        messagingSenderId: "174981013586",
        appId: "1:174981013586:web:9e69e7ac42ddff46d4ff8b"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const db = firebase.database();
    
    // Listen to all data changes
    db.ref('/').on('value', (snapshot) => {
        dbData = snapshot.val() || dbData;
        renderAll();
        updateStats();
    });

    // Presence
    const presRef = db.ref('presence/' + currentUser.id);
    presRef.set({ name: currentUser.name, lastSeen: Date.now() });
    presRef.onDisconnect().remove();
}

/* ═══ NAVIGATION ═══ */
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.nav-t').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderAll();
}

/* ═══ RENDERING ═══ */
function renderAll() {
    const container = document.getElementById('mainContent');
    if (currentTab === 'map') renderMap(container);
    else if (currentTab === 'count') renderCount(container);
    else if (currentTab === 'users') renderUsers(container);
    else if (currentTab === 'log') renderLog(container);
}

function renderMap(container) {
    let html = '<div class="map-grid">';
    WINGS.forEach(w => {
        const data = dbData.wings[w.id] || { total: 0, done: false };
        const isBusy = dbData.winglocks[w.id] && dbData.winglocks[w.id] !== currentUser.name;
        html += `
            <div class="map-cell ${data.done ? 'done' : ''} ${isBusy ? 'busy' : ''}">
                <div class="map-cell-name">${w.name}</div>
                <div class="map-cell-num">${data.total || 0}</div>
                ${isBusy ? '<div style="font-size:8px">בספירה...</div>' : ''}
            </div>
        `;
    });
    html += '</div>';
    
    html += '<h4 style="margin: 20px 0 10px">מקומות ציבוריים</h4><div class="map-grid">';
    GENERAL_AREAS.forEach(g => {
        const val = dbData.general[g] || 0;
        html += `
            <div class="map-cell ${val > 0 ? 'done' : ''}">
                <div class="map-cell-name">${g}</div>
                <div class="map-cell-num">${val}</div>
            </div>
        `;
    });
    html += '</div>';
    container.innerHTML = html;
}

function renderCount(container) {
    let html = '<h3>הזנת נתונים</h3>';
    WINGS.forEach(w => {
        const data = dbData.wings[w.id] || { total: 0, done: false };
        const lockedBy = dbData.winglocks[w.id];
        const isLockedByMe = lockedBy === currentUser.name;
        const isLockedByOther = lockedBy && lockedBy !== currentUser.name;
        
        html += `
            <div class="wing-card ${data.done ? 'done' : ''} ${isLockedByOther ? 'busy' : ''}">
                <div class="wing-main">
                    <div class="wing-info">
                        <div class="wing-name">${w.name}</div>
                        ${isLockedByOther ? `<div style="font-size:10px; color:var(--amber)">נעול ע"י ${lockedBy}</div>` : ''}
                    </div>
                    <div class="wing-right">
                        <input type="number" class="big-inp" value="${data.total || ''}" 
                               ${isLockedByOther ? 'disabled' : ''}
                               onfocus="lockWing('${w.id}')"
                               onblur="updateWing('${w.id}', this.value)"
                               placeholder="0">
                        <button onclick="toggleDone('${w.id}')" class="status-btn">${data.done ? '✓' : '○'}</button>
                    </div>
                </div>
            </div>
        `;
    });
    container.innerHTML = html;
}

/* ═══ LOGIC ═══ */
function updateWing(id, val) {
    const db = firebase.database();
    db.ref('wings/' + id).update({
        total: parseInt(val) || 0,
        lastUpdate: Date.now(),
        updatedBy: currentUser.name
    });
    db.ref('winglocks/' + id).remove();
    addLog(`עדכון אגף ${id}: ${val}`);
}

function lockWing(id) {
    firebase.database().ref('winglocks/' + id).set(currentUser.name);
}

function toggleDone(id) {
    const cur = dbData.wings[id] ? dbData.wings[id].done : false;
    firebase.database().ref('wings/' + id).update({ done: !cur });
}

function updateStats() {
    let present = 0;
    WINGS.forEach(w => present += (dbData.wings[w.id]?.total || 0));
    GENERAL_AREAS.forEach(g => present += (dbData.general[g] || 0));
    
    document.getElementById('statPresent').textContent = present;
    document.getElementById('statTotal').textContent = present; // Plus exits logic
}

function addLog(msg) {
    const logRef = firebase.database().ref('log');
    logRef.push({
        text: msg,
        user: currentUser.name,
        time: new Date().toLocaleTimeString('he-IL')
    });
}

function toggleTheme() {
    document.body.classList.toggle('light');
}

/* ═══ HELPERS ═══ */
function openOverlay(title, content) {
    document.getElementById('overlayTitle').textContent = title;
    document.getElementById('overlayBody').innerHTML = content;
    document.getElementById('genericOverlay').classList.add('open');
}

function closeOverlay() {
    document.getElementById('genericOverlay').classList.remove('open');
}
</script>
</body>
</html>
