<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>אביבים - מערכת פיקוד ואופרציה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg:#06090d; --s1:#0b1018; --s2:#101620; --s3:#161e2a; --s4:#1d2635;
            --border:rgba(255,255,255,0.055); --border2:rgba(255,255,255,0.1);
            --text:#dde6f0; --muted:#8aa4bf; --dim:#5a7a96;
            --accent:#2d72c8; --accent-glow:rgba(45,114,200,0.18);
            --gold:#c8a84b; --gold-dim:rgba(200,168,75,0.12); --gold-border:rgba(200,168,75,0.28);
            --green:#1db954; --green-dim:rgba(29,185,84,0.1); --green-border:rgba(29,185,84,0.28);
            --amber:#e09b35; --amber-dim:rgba(224,155,53,0.1); --red:#e04040;
        }

        body.light {
            --bg:#e4edf8; --s1:rgba(255,255,255,0.82); --s2:rgba(248,252,255,0.75);
            --s3:rgba(220,232,248,0.60); --s4:rgba(200,218,240,0.70);
            --border:rgba(150,190,235,0.35); --border2:rgba(130,178,225,0.50);
            --text:#0a1828; --muted:#46617e; --dim:#7a9ab8;
            --accent:#1550b8; --gold:#7a5c10; --green:#087832; --amber:#925208; --red:#a01414;
        }

        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overflow:hidden; font-family:'Heebo', sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; }
        
        body {
            display:flex; flex-direction:column;
            background: radial-gradient(ellipse at 15% 10%, rgba(45,114,200,0.13) 0%, transparent 48%),
                        radial-gradient(ellipse at 85% 88%, rgba(29,185,84,0.07) 0%, transparent 44%),
                        radial-gradient(ellipse at 55% 45%, rgba(200,168,75,0.05) 0%, transparent 38%),
                        linear-gradient(160deg,#06090d 0%,#07091280 50%,#050810 100%);
            background-attachment:fixed;
        }

        /* TOPBAR & NAVIGATION */
        #topbar {
            display:flex; align-items:center; gap:12px; padding:10px 14px;
            background:rgba(6,9,13,0.70); backdrop-filter:blur(40px) saturate(180%);
            border-bottom:1px solid var(--border); flex-shrink:0; z-index:100;
        }
        .tb-logo { width:55px; height:55px; object-fit:contain; border-radius:12px; }
        .tb-title-wrap { flex:1; }
        .tb-title { font-size:14px; font-weight:900; letter-spacing:-0.3px; line-height:1.1; }
        .tb-sub { font-size:10px; font-weight:600; color:var(--muted); margin-top:1px; }

        .perspective-bar {
            display:flex; background:rgba(255,255,255,0.05); margin:0 14px 10px; padding:4px; border-radius:14px; border:1px solid var(--border);
        }
        .persp-btn {
            flex:1; padding:8px; text-align:center; font-size:12px; font-weight:800; color:var(--muted); cursor:pointer; transition:0.3s; border-radius:10px;
        }
        .persp-btn.active { background:var(--accent); color:#fff; box-shadow:0 4px 15px var(--accent-glow); }

        /* STATS STRIP */
        #statsStrip { display:flex; gap:6px; padding:6px 14px; overflow-x:auto; flex-shrink:0; }
        .stat-cell {
            flex:0 0 auto; min-width:95px; padding:10px; border-radius:15px; border:1px solid var(--border);
            background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); text-align:center;
        }
        .stat-num { font-size:26px; font-weight:900; color:var(--text); line-height:1; }
        .stat-lbl { font-size:9px; font-weight:700; color:var(--muted); margin-top:4px; text-transform:uppercase; }

        /* SCROLL AREA */
        #scroll { flex:1; overflow-y:auto; padding:0 14px 100px; }

        /* WING CARDS (OPERATIONAL) */
        .wc {
            background:rgba(255,255,255,0.04); backdrop-filter:blur(28px) saturate(160%);
            border:1px solid var(--border); border-radius:16px; margin-bottom:8px; overflow:hidden; transition:0.2s;
        }
        .wc.filled { border-color:rgba(45,114,200,0.4); background:rgba(45,114,200,0.06); }
        .wc.done { border-color:var(--green-border); background:rgba(29,185,84,0.06); }
        .wc.busy { border-color:rgba(224,155,53,0.4); }
        .wc-main { display:flex; align-items:center; padding:15px; gap:12px; }
        .wc-name { flex:1; font-size:16px; font-weight:900; }
        .big-inp {
            width:85px; background:rgba(255,255,255,0.06); border:1.5px solid var(--border);
            border-radius:12px; padding:10px 5px; text-align:center; color:var(--text);
            font-family:'Heebo'; font-size:26px; font-weight:900; outline:none;
        }
        .status-btn { width:35px; height:35px; border-radius:50%; border:1.5px solid var(--border); background:var(--s3); color:var(--muted); cursor:pointer; }
        .wing-card.done .status-btn { background:var(--green); color:#fff; border-color:var(--green); }

        /* SCAN ANIMATION */
        .busy-bar { height:2px; background:rgba(224,155,53,0.1); overflow:hidden; display:none; }
        .wc.busy .busy-bar { display:block; }
        .busy-fill { height:100%; width:30%; background:var(--amber); animation:scan 2s linear infinite; }
        @keyframes scan { from { transform:translateX(-100%); } to { transform:translateX(400%); } }

        /* COMMANDER MAP */
        .map-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:12px; }
        .map-cell {
            background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:16px;
            padding:20px 10px; text-align:center; backdrop-filter:blur(20px); transition:0.3s;
        }
        .map-cell.done { border-color:var(--green-border); box-shadow:0 0 15px var(--green-dim); }
        .map-cell-name { font-size:13px; color:var(--muted); font-weight:700; margin-bottom:8px; }
        .map-cell-num { font-size:32px; font-weight:900; color:var(--text); }

        /* CUSTOM NUMPAD */
        #numpad {
            position:fixed; bottom:0; left:0; right:0; background:rgba(6,9,13,0.96);
            backdrop-filter:blur(40px); border-top:1px solid var(--border2);
            padding:15px 15px 35px; display:none; z-index:2000;
        }
        .num-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; }
        .num-btn {
            height:55px; background:rgba(255,255,255,0.06); border:1px solid var(--border);
            border-radius:15px; color:#fff; font-size:22px; font-weight:700; cursor:pointer;
        }
        .num-btn:active { background:var(--accent); transform:scale(0.95); }

        /* CHAT & LOG */
        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0; background:rgba(11,16,24,0.9);
            border-top:1px solid var(--border); display:flex; padding:12px 0; z-index:200;
        }
        .nav-item { flex:1; text-align:center; color:var(--muted); font-size:11px; font-weight:800; cursor:pointer; }
        .nav-item.active { color:var(--accent); }

        /* LOGIN */
        #loginScreen {
            position:fixed; inset:0; background:var(--bg); z-index:5000;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
        }
        .login-card {
            width:100%; max-width:340px; background:rgba(255,255,255,0.03); padding:35px;
            border-radius:24px; border:1px solid var(--border2); backdrop-filter:blur(50px);
            box-shadow:0 20px 50px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-card">
        <div style="text-align:center; margin-bottom:30px;">
            <div style="width:70px; height:70px; background:var(--accent); border-radius:18px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:32px; margin:0 auto 15px; box-shadow:0 0 30px var(--accent-glow);">א</div>
            <h2 style="font-size:26px; font-weight:900; letter-spacing:-1px;">מרכז פיקוד אביבים</h2>
            <p style="font-size:12px; color:var(--muted);">הכנס זיהוי לסנכרון נתונים</p>
        </div>
        <input type="text" id="userInp" placeholder="שם הסוהר / מפקד" style="width:100%; padding:15px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:20px; outline:none; text-align:center; font-weight:700;">
        <button onclick="login()" style="width:100%; padding:16px; border-radius:12px; background:var(--accent); color:#fff; font-weight:900; border:none; cursor:pointer; font-size:16px;">כניסה למערכת</button>
    </div>
</div>

<!-- APP UI -->
<div id="appUI" style="display:none; flex-direction:column; height:100%;">
    
    <!-- TOPBAR -->
    <div id="topbar">
        <div style="width:45px; height:45px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:20px;">א</div>
        <div class="tb-title-wrap">
            <div class="tb-title" id="topTitle">מרכז פיקוד</div>
            <div class="tb-sub" id="countStatus">סנכרון פעיל...</div>
        </div>
        <div id="userNameDisplay" style="font-size:12px; font-weight:800; color:var(--gold);"></div>
    </div>

    <!-- STATS STRIP -->
    <div id="statsStrip">
        <div class="stat-cell" style="border-right:3px solid var(--accent)">
            <div class="stat-num" id="statPresent">0</div>
            <div class="stat-lbl">במקום</div>
        </div>
        <div class="stat-cell" style="border-right:3px solid var(--amber)">
            <div class="stat-num" id="statExits">0</div>
            <div class="stat-lbl">יציאות</div>
        </div>
        <div class="stat-cell" style="border-right:3px solid var(--green)">
            <div class="stat-num" id="statTotal">0</div>
            <div class="stat-lbl">מצבה</div>
        </div>
    </div>

    <!-- PERSPECTIVE SELECTOR -->
    <div class="mode-selector">
        <div class="mode-btn active" id="btnCmd" onclick="setViewMode('commander')">מבט מפקד</div>
        <div class="mode-btn" id="btnOps" onclick="setViewMode('officer')">הזנת נתונים</div>
    </div>

    <!-- SCROLL AREA -->
    <div id="scroll">
        <div id="dynamicContent"></div>
    </div>

    <!-- NUMPAD -->
    <div id="numpad">
        <div class="num-grid">
            <button class="num-btn" onclick="tapNum('1')">1</button>
            <button class="num-btn" onclick="tapNum('2')">2</button>
            <button class="num-btn" onclick="tapNum('3')">3</button>
            <button class="num-btn" onclick="tapNum('4')">4</button>
            <button class="num-btn" onclick="tapNum('5')">5</button>
            <button class="num-btn" onclick="tapNum('6')">6</button>
            <button class="num-btn" onclick="tapNum('7')">7</button>
            <button class="num-btn" onclick="tapNum('8')">8</button>
            <button class="num-btn" onclick="tapNum('9')">9</button>
            <button class="num-btn" onclick="tapNum('0')">0</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:12px;">
            <button class="num-btn" style="flex:1; background:var(--red);" onclick="tapNum('del')">מחק</button>
            <button class="num-btn" style="flex:1; background:var(--green);" onclick="closeNumpad()">אישור</button>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('main')">ראשי</div>
        <div class="nav-item" onclick="switchTab('log')">לוג</div>
        <div class="nav-item" onclick="switchTab('archive')">ארכיון</div>
    </div>
</div>

<script>
/* ═══ DATA & CONFIG ═══ */
const WINGS = [
    {id:'w1', name:'אגף ורד'},
    {id:'w2', name:'אגף חמנייה'},
    {id:'w3', name:'אגף כלנית'},
    {id:'w4', name:'אגף רקפת'},
    {id:'w5', name:'אגף נרקיס'}
];

/* ═══ FIREBASE SETUP ═══ */
firebase.initializeApp({
    apiKey: "AIzaSyBSV1dq1NgIr92wLbDelT5K6LgsOL9NQVQ",
    authDomain: "dekel-prisoner-count-fcc36.firebaseapp.com",
    databaseURL: "https://dekel-prisoner-count-fcc36-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dekel-prisoner-count-fcc36"
});
const db = firebase.database();

/* ═══ APP STATE ═══ */
let currentUser = "";
let viewMode = "commander"; 
let currentTab = "main";
let activeWingId = null;
let data = { wings: {}, winglocks: {}, log: [], presence: {} };

/* ═══ AUTH & INIT ═══ */
function login() {
    const val = document.getElementById('userInp').value.trim();
    if(!val) return;
    currentUser = val;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appUI').style.display = 'flex';
    document.getElementById('userNameDisplay').textContent = currentUser;
    
    // Presence
    const pkey = currentUser.replace(/[.#$[\]]/g, '_');
    db.ref('presence/' + pkey).set({ name: currentUser, ts: Date.now() });
    db.ref('presence/' + pkey).onDisconnect().remove();

    initListeners();
}

function initListeners() {
    db.ref('/').on('value', snap => {
        const val = snap.val() || {};
        data.wings = val.wings || {};
        data.winglocks = val.winglocks || {};
        data.log = val.log ? Object.values(val.log) : [];
        render();
    });
}

/* ═══ RENDER LOGIC ═══ */
function setViewMode(m) {
    viewMode = m;
    document.getElementById('btnCmd').classList.toggle('active', m === 'commander');
    document.getElementById('btnOps').classList.toggle('active', m === 'officer');
    render();
}

function switchTab(t) {
    currentTab = t;
    render();
}

function render() {
    const el = document.getElementById('dynamicContent');
    updateStats();

    if(currentTab === 'log') {
        renderLog(el);
        return;
    }

    if(viewMode === 'commander') renderCommanderMap(el);
    else renderOfficerInput(el);
}

function renderCommanderMap(el) {
    let html = '<div class="map-grid">';
    WINGS.forEach(w => {
        const wd = data.wings[w.id] || { total: 0, done: false };
        const locked = data.winglocks[w.id];
        const busy = locked && locked !== currentUser;
        
        html += `
            <div class="map-cell ${wd.done ? 'done' : ''}">
                <div class="map-cell-name">${w.name}</div>
                <div class="map-cell-num">${wd.total || 0}</div>
                ${busy ? `<div style="font-size:9px; color:var(--amber); margin-top:5px;">בספירה: ${locked}</div>` : ''}
            </div>
        `;
    });
    html += '</div>';
    el.innerHTML = html;
}

function renderOfficerInput(el) {
    let html = '';
    WINGS.forEach(w => {
        const wd = data.wings[w.id] || { total: 0, done: false };
        const locked = data.winglocks[w.id];
        const isLockedByOther = locked && locked !== currentUser;

        html += `
            <div class="wc ${wd.done ? 'done' : ''} ${isLockedByOther ? 'busy' : ''}">
                <div class="wc-main">
                    <div class="wc-name">${w.name}</div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <input type="number" class="big-inp" id="inp-${w.id}" value="${wd.total || ''}" 
                               ${isLockedByOther ? 'readonly' : ''} onfocus="openNumpad('${w.id}')" placeholder="0">
                        <button class="status-btn" onclick="toggleDone('${w.id}')">${wd.done ? '✓' : '○'}</button>
                    </div>
                </div>
                <div class="busy-bar"><div class="busy-fill"></div></div>
            </div>
        `;
    });
    el.innerHTML = html;
}

function renderLog(el) {
    el.innerHTML = [...data.log].reverse().map(l => `
        <div style="padding:12px; border-bottom:1px solid var(--border); font-size:13px; background:rgba(255,255,255,0.02); border-radius:10px; margin-bottom:8px;">
            <b style="color:var(--accent)">${l.user}:</b> ${l.msg}
            <div style="font-size:10px; color:var(--dim)">${l.time}</div>
        </div>
    `).join('');
}

/* ═══ NUMPAD ═══ */
function openNumpad(id) {
    activeWingId = id;
    document.getElementById('numpad').style.display = 'block';
    db.ref('winglocks/' + id).set(currentUser);
}

function tapNum(val) {
    const inp = document.getElementById('inp-' + activeWingId);
    if(val === 'del') inp.value = inp.value.slice(0, -1);
    else if(inp.value.length < 3) inp.value += val;
}

function closeNumpad() {
    const val = document.getElementById('inp-' + activeWingId).value;
    db.ref('wings/' + activeWingId).update({ total: parseInt(val) || 0 });
    db.ref('winglocks/' + activeWingId).remove();
    
    addLog(`עדכון ${WINGS.find(w=>w.id===activeWingId).name} ל-${val}`);
    document.getElementById('numpad').style.display = 'none';
    activeWingId = null;
}

/* ═══ LOGIC ═══ */
function toggleDone(id) {
    const cur = data.wings[id] ? data.wings[id].done : false;
    db.ref('wings/' + id).update({ done: !cur });
}

function updateStats() {
    let present = 0;
    WINGS.forEach(w => present += (data.wings[w.id]?.total || 0));
    document.getElementById('statPresent').textContent = present;
    document.getElementById('statTotal').textContent = present;
}

function addLog(m) {
    db.ref('log').push({ user: currentUser, msg: m, time: new Date().toLocaleTimeString() });
}

</script>
</body>
</html>
