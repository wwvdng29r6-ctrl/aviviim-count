<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>אביבים - מערכת שליחה ופיקוד</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase & Tools -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* המשתנים והצבעים מהקוד המקצועי שלך */
        :root {
            --bg:#06090d; --s1:#0b1018; --s2:#101620; --s3:#161e2a; --s4:#1d2635;
            --border:rgba(255,255,255,0.055); --border2:rgba(255,255,255,0.1);
            --text:#dde6f0; --muted:#8aa4bf; --dim:#5a7a96;
            --accent:#2d72c8; --accent-glow:rgba(45,114,200,0.18);
            --gold:#c8a84b; --gold-dim:rgba(200,168,75,0.12); --gold-border:rgba(200,168,75,0.28);
            --green:#1db954; --green-dim:rgba(29,185,84,0.1); --green-border:rgba(29,185,84,0.28);
            --amber:#e09b35; --amber-dim:rgba(224,155,53,0.1); --red:#e04040;
        }

        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overflow:hidden; font-family:'Heebo', sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; }
        
        body {
            display:flex; flex-direction:column;
            background: radial-gradient(ellipse at 15% 10%, rgba(45,114,200,0.13) 0%, transparent 48%),
                        radial-gradient(ellipse at 85% 88%, rgba(29,185,84,0.07) 0%, transparent 44%),
                        linear-gradient(160deg,#06090d 0%,#050810 100%);
        }

        /* עיצוב ה-Glassmorphism מהמפקד */
        .glass-panel {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
        }

        /* TOPBAR */
        #topbar {
            display:flex; align-items:center; gap:12px; padding:10px 14px;
            background:rgba(6,9,13,0.70); backdrop-filter:blur(40px);
            border-bottom:1px solid var(--border); flex-shrink:0; z-index:100;
        }

        /* MODE SWITCHER (Commander / Officer) */
        .mode-switcher {
            display: flex; background: var(--s2); margin: 0 14px 10px; border-radius: 12px; padding: 4px; border: 1px solid var(--border);
        }
        .mode-btn {
            flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 800; color: var(--muted); cursor: pointer; border-radius: 9px; transition: 0.2s;
        }
        .mode-btn.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px var(--accent-glow); }

        /* STATS STRIP */
        #statsStrip { display:flex; gap:6px; padding:6px 14px; overflow-x:auto; flex-shrink:0; }
        .stat-cell {
            flex:0 0 auto; min-width:100px; padding:10px; border-radius:14px;
            border:1px solid var(--border); background:rgba(255,255,255,0.04); text-align:center;
        }
        .stat-num { font-size:26px; font-weight:900; line-height:1; }
        .stat-lbl { font-size:9px; font-weight:700; color:var(--muted); margin-top:4px; text-transform:uppercase; }

        /* SCROLL AREA */
        #scroll { flex:1; overflow-y:auto; padding:0 14px 100px; }

        /* WING CARD (Officer Mode) */
        .wc {
            background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:14px;
            margin-bottom:8px; overflow:hidden; transition: 0.2s; position: relative;
        }
        .wc.filled { border-color:rgba(45,114,200,.40); background:rgba(45,114,200,.06); }
        .wc.done { border-color:var(--green-border); background:rgba(29,185,84,.06); }
        .wc.busy { border-color:var(--amber); }
        .wc-main { display:flex; align-items:center; padding:12px 14px; gap:10px; }
        .wc-name { font-size:15px; font-weight:900; flex:1; }
        .wc-num { font-size:26px; font-weight:900; color:var(--dim); min-width:40px; text-align:left; }
        .wc.filled .wc-num { color:var(--text); }
        .wc.done .wc-num { color:var(--green); }

        /* MAP GRID (Commander Mode) */
        .map-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:10px; }
        .map-cell {
            background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:14px;
            padding:15px 10px; text-align:center; transition: 0.3s;
        }
        .map-cell.done { border-color:var(--green-border); background:rgba(29,185,84,.07); }
        .map-cell.busy { border-color:var(--amber); animation: pulse 2s infinite; }
        @keyframes pulse { 0% {opacity:1} 50% {opacity:0.5} 100% {opacity:1} }

        /* NUMPAD */
        .numpad-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,16,30,0.95);
            backdrop-filter: blur(20px); border-top: 1px solid var(--border2);
            padding: 10px 10px 25px; display: none; z-index: 2000;
        }
        .numpad-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .num-btn {
            height: 50px; background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            border-radius: 12px; color: #fff; font-size: 20px; font-weight: 700; cursor: pointer;
        }
        .num-btn:active { background: var(--accent); }

        /* BOTTOM NAV */
        .bottom-bar {
            position:fixed; bottom:16px; left:12px; right:12px; display:flex; gap:6px; z-index:200;
        }
        .bb-b {
            flex:1; padding:12px; border-radius:18px; border:1px solid var(--border2);
            background:rgba(255,255,255,0.05); backdrop-filter:blur(32px);
            color:var(--muted); text-align:center; font-size:12px; font-weight:700; cursor:pointer;
        }
        .bb-b.active { color:var(--text); background:rgba(45,114,200,0.18); border-color:var(--accent); }

        /* LOGIN */
        #loginScreen {
            position:fixed; inset:0; background:var(--bg); z-index:9999;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div style="background:rgba(255,255,255,0.05); padding:30px; border-radius:20px; border:1px solid var(--border2); width:320px; backdrop-filter:blur(50px);">
        <h2 style="text-align:center; margin-bottom:20px; font-weight:900; letter-spacing:-1px;">כניסה למערכת</h2>
        <input type="text" id="userName" placeholder="שם משתמש" style="width:100%; padding:12px; background:var(--s3); border:1px solid var(--border); border-radius:10px; color:#fff; margin-bottom:10px; outline:none;">
        <input type="password" id="userPin" placeholder="קוד גישה" style="width:100%; padding:12px; background:var(--s3); border:1px solid var(--border); border-radius:10px; color:#fff; margin-bottom:20px; outline:none; text-align:center;">
        <button onclick="login()" style="width:100%; padding:14px; background:var(--accent); border:none; border-radius:10px; color:#fff; font-weight:900; cursor:pointer;">כניסה</button>
    </div>
</div>

<!-- TOPBAR -->
<div id="topbar">
    <div style="width:40px; height:40px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:900;">א</div>
    <div class="tb-title-wrap">
        <div class="tb-title" id="modeTitle">מרכז פיקוד</div>
        <div class="tb-sub" id="userDisplay">מחובר כרגע</div>
    </div>
    <div class="pulse-dot"></div>
</div>

<!-- STATS -->
<div id="statsStrip">
    <div class="stat-cell">
        <div class="stat-num" id="totalPresent">0</div>
        <div class="stat-lbl">במקום</div>
    </div>
    <div class="stat-cell">
        <div class="stat-num" id="totalExits" style="color:var(--amber)">0</div>
        <div class="stat-lbl">יציאות</div>
    </div>
    <div class="stat-cell">
        <div class="stat-num" id="totalStatus" style="color:var(--accent)">0</div>
        <div class="stat-lbl">מצבה</div>
    </div>
</div>

<!-- MODE SWITCHER -->
<div class="mode-switcher">
    <div class="mode-btn active" id="modeCmd" onclick="switchMode('commander')">מבט מפקד</div>
    <div class="mode-btn" id="modeOps" onclick="switchMode('officer')">מבט סוהר</div>
</div>

<!-- CONTENT -->
<div id="scroll">
    <div id="tabContent"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-bar">
    <div class="bb-b active" onclick="switchTab('main')">ראשי</div>
    <div class="bb-b" onclick="switchTab('log')">לוג</div>
    <div class="bb-b" onclick="switchTab('archive')">ארכיון</div>
</div>

<!-- NUMPAD -->
<div id="numpad" class="numpad-bar">
    <div class="numpad-grid">
        <button class="num-btn" onclick="numKey('1')">1</button>
        <button class="num-btn" onclick="numKey('2')">2</button>
        <button class="num-btn" onclick="numKey('3')">3</button>
        <button class="num-btn" onclick="numKey('4')">4</button>
        <button class="num-btn" onclick="numKey('5')">5</button>
        <button class="num-btn" onclick="numKey('6')">6</button>
        <button class="num-btn" onclick="numKey('7')">7</button>
        <button class="num-btn" onclick="numKey('8')">8</button>
        <button class="num-btn" onclick="numKey('9')">9</button>
        <button class="num-btn" onclick="numKey('0')">0</button>
    </div>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="num-btn" style="flex:1; background:var(--red)" onclick="numKey('del')">מחק</button>
        <button class="num-btn" style="flex:1; background:var(--green)" onclick="closeNumpad()">אישור</button>
    </div>
</div>

<script>
/* ═══ CONFIG ═══ */
const WINGS = [
    {id:'w1', name:'אגף ורד'},
    {id:'w2', name:'אגף חמנייה'},
    {id:'w3', name:'אגף כלנית'},
    {id:'w4', name:'אגף רקפת'},
    {id:'w5', name:'אגף נרקיס'}
];
const GENERALS = ['ספרייה', 'חדר אוכל', 'מועדון', 'גינה'];

/* ═══ FIREBASE ═══ */
firebase.initializeApp({
    apiKey: "AIzaSyBSV1dq1NgIr92wLbDelT5K6LgsOL9NQVQ",
    authDomain: "dekel-prisoner-count-fcc36.firebaseapp.com",
    databaseURL: "https://dekel-prisoner-count-fcc36-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dekel-prisoner-count-fcc36"
});
const db = firebase.database();

/* ═══ STATE ═══ */
let currentUser = "";
let currentMode = "commander"; // commander / officer
let currentTab = "main";
let data = { wings: {}, general: {}, winglocks: {}, presence: {}, log: [] };
let activeInput = null;

/* ═══ AUTH ═══ */
function login() {
    const name = document.getElementById('userName').value.trim();
    if(!name) return;
    currentUser = name;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('userDisplay').textContent = "שלום, " + name;
    init();
}

function init() {
    db.ref('/').on('value', snap => {
        const val = snap.val() || {};
        data.wings = val.wings || {};
        data.general = val.general || {};
        data.winglocks = val.winglocks || {};
        data.presence = val.presence || {};
        data.log = val.log ? Object.values(val.log) : [];
        render();
    });
}

/* ═══ NAVIGATION ═══ */
function switchMode(m) {
    currentMode = m;
    document.getElementById('modeCmd').classList.toggle('active', m==='commander');
    document.getElementById('modeOps').classList.toggle('active', m==='officer');
    document.getElementById('modeTitle').textContent = m === 'commander' ? "מרכז פיקוד" : "מערכת הזנה";
    render();
}

function switchTab(t) {
    currentTab = t;
    const btns = document.querySelectorAll('.bb-b');
    btns.forEach((b, i) => b.classList.toggle('active', ['main','log','archive'][i] === t));
    render();
}

/* ═══ RENDER ═══ */
function render() {
    const container = document.getElementById('tabContent');
    updateStats();

    if(currentTab === 'log') {
        renderLog(container);
        return;
    }

    if(currentMode === 'commander') renderCommander(container);
    else renderOfficer(container);
}

function renderCommander(el) {
    let h = '<div class="map-grid">';
    WINGS.forEach(w => {
        const wd = data.wings[w.id] || {total:0, done:false};
        const locker = data.winglocks[w.id];
        const busy = locker && locker !== currentUser;
        h += `
            <div class="map-cell ${wd.done?'done':''} ${busy?'busy':''}">
                <div class="map-cell-name">${w.name}</div>
                <div class="map-cell-num">${wd.total || 0}</div>
                ${busy ? `<div style="font-size:8px; color:var(--amber); margin-top:5px;">בספירה: ${locker}</div>` : ''}
            </div>
        `;
    });
    h += '</div>';
    el.innerHTML = h;
}

function renderOfficer(el) {
    let h = '';
    WINGS.forEach(w => {
        const wd = data.wings[w.id] || {total:0, done:false};
        const locker = data.winglocks[w.id];
        const isLocked = locker && locker !== currentUser;
        h += `
            <div class="wc ${wd.done?'done':''} ${isLocked?'busy':''}" id="wc-${w.id}">
                <div class="wc-main">
                    <div class="wc-name">${w.name}</div>
                    <div class="wc-right">
                        <input type="number" class="big-inp" value="${wd.total || ''}" 
                               id="inp-${w.id}" placeholder="0" 
                               ${isLocked ? 'disabled' : ''}
                               onfocus="openNumpad('${w.id}')">
                        <button onclick="toggleDone('${w.id}')" class="status-btn">${wd.done?'✓':'○'}</button>
                    </div>
                </div>
                <div class="scan-bar"><div class="scan-fill"></div></div>
            </div>
        `;
    });
    el.innerHTML = h;
}

function renderLog(el) {
    const logs = [...data.log].reverse().slice(0, 50);
    el.innerHTML = logs.map(l => `
        <div style="padding:12px; border-bottom:1px solid var(--border); font-size:13px; background:rgba(255,255,255,0.02); margin-bottom:5px; border-radius:10px;">
            <span style="color:var(--accent); font-weight:800;">${l.user}:</span> ${l.text}
            <div style="font-size:10px; color:var(--dim); margin-top:4px;">${l.time}</div>
        </div>
    `).join('');
}

/* ═══ LOGIC ═══ */
function openNumpad(id) {
    activeInput = id;
    document.getElementById('numpad').style.display = 'block';
    db.ref('winglocks/' + id).set(currentUser);
}

function closeNumpad() {
    const val = document.getElementById('inp-' + activeInput).value;
    updateValue(activeInput, val);
    document.getElementById('numpad').style.display = 'none';
    db.ref('winglocks/' + activeInput).remove();
    activeInput = null;
}

function numKey(key) {
    if(!activeInput) return;
    const inp = document.getElementById('inp-' + activeInput);
    if(key === 'del') {
        inp.value = inp.value.slice(0,-1);
    } else {
        if(inp.value.length < 3) inp.value += key;
    }
}

function updateValue(id, val) {
    db.ref('wings/' + id).update({
        total: parseInt(val) || 0,
        user: currentUser,
        ts: Date.now()
    });
    addLog(`עדכן את ${WINGS.find(w=>w.id===id).name} ל-${val}`);
}

function toggleDone(id) {
    const cur = data.wings[id] ? data.wings[id].done : false;
    db.ref('wings/' + id).update({ done: !cur });
}

function updateStats() {
    let total = 0;
    WINGS.forEach(w => total += (data.wings[w.id]?.total || 0));
    document.getElementById('totalPresent').textContent = total;
    document.getElementById('totalStatus').textContent = total;
}

function addLog(txt) {
    db.ref('log').push({
        user: currentUser,
        text: txt,
        time: new Date().toLocaleTimeString('he-IL')
    });
}

function toggleTheme() {
    document.body.classList.toggle('light');
    document.body.classList.toggle('dark');
}

</script>
</body>
</html>
